<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO PHOTO STUDIO | 終極設計工作室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@400;700&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&family=Caveat:wght@600&display=swap');
        
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #f8f9fa; overscroll-behavior: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .canvas-container { margin: 0 auto; box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-radius: 4px; background-color: white; transition: all 0.3s; }
        
        .color-dot { width: 22px; height: 22px; cursor: pointer; border-radius: 50%; border: 1px solid #e5e7eb; transition: all 0.2s; }
        .color-dot:hover { transform: scale(1.15); box-shadow: 0 0 5px rgba(0,0,0,0.1); }
        .color-dot.active { border: 2px solid #000; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        
        .filter-scroll::-webkit-scrollbar { display: none; } 
        .filter-item { flex: 0 0 70px; border-radius: 8px; border: 1px solid #e5e7eb; cursor: pointer; transition: all 0.2s; background-color: white; padding: 4px; }
        .filter-item.active { border-color: #000; background-color: #f8f9fa; }
        
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-900 antialiased relative py-10">

    <div style="visibility: hidden; position: absolute; top: -9999px;">
        <span style="font-family: 'Noto Serif TC';">預載</span><span style="font-family: 'Ma Shan Zheng';">預載</span>
        <span style="font-family: 'Zhi Mang Xing';">預載</span><span style="font-family: 'ZCOOL QingKe HuangYou';">預載</span>
        <span style="font-family: 'ZCOOL KuaiLe';">預載</span>
    </div>

    <div class="max-w-3xl mx-auto px-6">
        <header class="text-center mb-10 overflow-x-auto">
            <h1 class="text-3xl md:text-4xl font-light tracking-[0.3em] uppercase mb-2 text-gray-800">Pro Studio</h1>
            <p class="text-gray-400 text-xs tracking-widest font-light overflow-x-auto">Xiaomi Pro 2x3" 高級完全體</p>
        </header>

        <div id="step1-container" class="bg-white rounded-2xl shadow-sm p-8 mb-6 border border-gray-100 transition-all overflow-x-auto">
            <h2 class="text-base font-medium mb-6 flex items-center tracking-wider text-gray-700">
                <span class="w-6 h-6 shrink-0 bg-black text-white rounded-full text-xs flex items-center justify-center mr-3 font-normal overflow-x-auto">1</span>
                填寫訂單資訊
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <input type="text" id="userName" placeholder="蝦皮帳號 / 姓名 (必填)" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-black transition font-light text-sm">
                    <p id="nameError" class="text-red-500 text-xs mt-1 hidden tracking-wide">請填寫您的稱呼或帳號</p>
                </div>
                <input type="text" id="orderID" placeholder="蝦皮訂單編號" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-black transition font-light text-sm">
            </div>
            <button id="nextStepBtn" class="w-full bg-gray-900 text-white py-3.5 rounded-xl font-light tracking-widest hover:bg-black transition text-sm shadow-md">
                進入線上設計
            </button>
        </div>

        <div id="step2-container" class="bg-white rounded-2xl shadow-sm border border-gray-100 hidden fade-in overflow-hidden relative">
            
            <div class="bg-gray-100/50 py-10 relative flex justify-center border-b border-gray-50 overflow-x-auto">
                <button id="layoutToggleBtn" onclick="toggleLayout()" class="absolute top-4 right-4 z-20 bg-white shadow-md border border-gray-100 px-3 py-1.5 rounded-full text-[10px] font-medium tracking-wide text-gray-600 hover:text-black transition flex items-center gap-1.5 overflow-x-auto overflow-x-auto overflow-x-auto overflow-x-auto">
                    <i class="fa-solid fa-expand"></i> <span id="layoutText">目前: 拍立得白框</span>
                </button>
                <canvas id="editorCanvas"></canvas>
            </div>

            <div id="objectTools" class="px-6 py-4 bg-white hidden flex justify-between gap-6 transition border-b border-gray-50 relative z-10">
                <div class="flex gap-3 items-center">
                    <div class="flex gap-1 border border-gray-100 p-1 rounded-lg bg-gray-50/50 overflow-x-auto overflow-x-auto overflow-x-auto overflow-x-auto overflow-x-auto">
                        <button onclick="bringFront()" title="上移一層" class="w-9 h-9 text-gray-500 hover:text-black hover:bg-white rounded-md flex flex-col items-center justify-center gap-0.5"><i class="fa-solid fa-layer-group"></i><span class="text-[9px]">上層</span></button>
                        <button onclick="sendBack()" title="下移一層" class="w-9 h-9 text-gray-500 hover:text-black hover:bg-white rounded-md flex flex-col items-center justify-center gap-0.5"><i class="fa-solid fa-layer-group fa-flip-vertical"></i><span class="text-[9px]">下層</span></button>
                    </div>
                    <button id="beautyBtn" onclick="toggleBeauty()" class="w-20 h-9 rounded-lg border border-gray-100 bg-gray-50 text-gray-600 hover:text-black flex items-center justify-center gap-1.5 transition text-xs font-light tracking-wide overflow-x-auto">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> <span>美顏 OFF</span>
                    </button>
                </div>

                <div id="textTools" class="hidden flex-1 flex gap-5 items-center justify-center">
                    <select id="fontFamily" class="text-xs px-2 py-1.5 border border-gray-100 rounded-lg focus:outline-none focus:border-black font-light tracking-wide bg-gray-50/50 max-w-[120px]">
                        <option value="Noto Sans TC" selected>經典黑體</option>
                        <option value="Noto Serif TC">高級宋體</option>
                        <option value="Ma Shan Zheng">毛筆行書</option>
                        <option value="Zhi Mang Xing">藝術狂草</option>
                        <option value="ZCOOL QingKe HuangYou">麥克筆體</option>
                        <option value="ZCOOL KuaiLe">可愛圓體</option>
                        <option value="Caveat">英文手寫(限英文)</option>
                    </select>
                    <div class="flex-1 max-w-sm border border-gray-100 p-2 rounded-xl bg-gray-50/50 overflow-x-auto">
                        <div class="grid grid-cols-8 gap-1.5 justify-items-center" id="colorPalette"></div>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <button onclick="deleteObj()" class="w-10 h-10 bg-red-50 text-red-400 hover:text-red-600 hover:bg-red-100 rounded-xl transition"><i class="fa-regular fa-trash-can"></i></button>
                </div>
            </div>

            <div class="px-6 py-5 bg-white space-y-5">
                
                <div class="p-4 border border-gray-100 rounded-xl bg-gray-50/50">
                    <label class="text-[11px] text-gray-400 font-medium mb-3 block tracking-widest text-center overflow-x-auto">風格濾鏡 (所見即所得，可左右滑動)</label>
                    <div class="flex overflow-x-auto gap-3.5 filter-scroll pb-2 max-w-lg mx-auto snap-x">
                        <button onclick="applyFilter('Original', this)" class="filter-item active text-center snap-center">
                            <img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5 grayscale-0"><span class="text-[10px] font-light">原圖</span>
                        </button>
                        <button onclick="applyFilter('KPop', this)" class="filter-item text-center snap-center">
                            <img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5" style="filter: brightness(1.05) contrast(1.1) saturate(1.5) hue-rotate(15deg);"><span class="text-[10px] font-medium text-pink-500">KPop女團</span>
                        </button>
                        <button onclick="applyFilter('BoyBand', this)" class="filter-item text-center snap-center">
                            <img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5" style="filter: contrast(1.15) saturate(0.5) hue-rotate(180deg);"><span class="text-[10px] font-medium text-blue-700">冷冽男團</span>
                        </button>
                        <button onclick="applyFilter('Cool', this)" class="filter-item text-center snap-center">
                            <img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5" style="filter: contrast(1.25) hue-rotate(180deg) brightness(1.1);"><span class="text-[10px] font-light">冷白皮</span>
                        </button>
                        <button onclick="applyFilter('Film', this)" class="filter-item text-center snap-center">
                            <img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5" style="filter: sepia(0.3) contrast(1.2) saturate(0.9);"><span class="text-[10px] font-light">底片感</span>
                        </button>
                        <button onclick="applyFilter('Vintage', this)" class="filter-item text-center snap-center">
                            <img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5 grayscale-0" style="filter: sepia(1);"><span class="text-[10px] font-light">即可拍</span>
                        </button>
                        <button onclick="applyFilter('Mono', this)" class="filter-item text-center snap-center">
                            <img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5" style="filter: grayscale(1);"><span class="text-[10px] font-light">Mono黑白</span>
                        </button>
                    </div>
                </div>

                <div class="flex justify-around items-center max-w-md mx-auto">
                    <label class="flex flex-col items-center gap-1.5 cursor-pointer text-gray-600 hover:text-black transition">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg"><i class="fa-regular fa-image"></i></div>
                        <span class="text-xs font-light tracking-wide">載入照片</span>
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                    </label>
                    <button onclick="addText()" class="flex flex-col items-center gap-1.5 text-gray-600 hover:text-black transition">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg"><i class="fa-solid fa-t"></i></div>
                        <span class="text-xs font-light tracking-wide">新增文字</span>
                    </button>
                    <button onclick="openLibrary()" class="flex flex-col items-center gap-1.5 text-gray-600 hover:text-black transition">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg"><i class="fa-regular fa-face-smile"></i></div>
                        <span class="text-xs font-light tracking-wide">貼紙圖庫</span>
                    </button>
                    <button onclick="clearCanvas()" class="flex flex-col items-center gap-1.5 text-red-300 hover:text-red-500 transition">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg"><i class="fa-solid fa-rotate-left"></i></div>
                        <span class="text-xs font-light tracking-wide">清空畫布</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="max-w-xs mx-auto mt-6">
            <button id="submitBtn" onclick="uploadDesign()" class="w-full bg-black text-white py-4 rounded-xl font-light tracking-[0.2em] hover:bg-gray-800 transition duration-300 text-sm hidden fade-in shadow-xl">
                確認並上傳設計成品
            </button>
            <p id="statusMsg" class="mt-4 text-center text-sm font-light tracking-wide"></p>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center hidden fade-in backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full mx-4 text-center">
            <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-4"><span class="text-xl">🛒</span></div>
            <h3 class="text-lg font-medium text-gray-900 mb-2 tracking-wide">尚未填寫訂單編號</h3>
            <p class="text-sm text-gray-500 font-light mb-6 leading-relaxed">建議您先至蝦皮賣場完成下單，以利工作室為您安排印製。</p>
            <div class="space-y-3">
                <button onclick="alert('前往蝦皮')" class="w-full bg-black text-white py-3 rounded-xl font-light tracking-widest text-sm">前往蝦皮下單</button>
                <button onclick="enterPreview()" class="w-full bg-white text-gray-500 border border-gray-200 py-3 rounded-xl font-light tracking-widest text-sm">我只想先預覽效果</button>
                <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="text-xs text-gray-400 mt-2">返回修改</button>
            </div>
        </div>
    </div>

    <div id="libraryModal" class="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-end justify-center hidden backdrop-blur-sm">
        <div class="bg-white w-full max-w-md h-[40vh] rounded-t-3xl shadow-2xl flex flex-col slide-up">
            <div class="p-4 flex justify-between items-center border-b border-gray-100">
                <h3 class="font-medium tracking-wide ml-4 text-gray-800">可愛貼紙庫</h3>
                <button onclick="document.getElementById('libraryModal').classList.add('hidden')" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200 transition"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 grid grid-cols-4 gap-4 content-start bg-gray-50">
                <img onclick="addSticker('https://i.imgur.com/B9O6zF6.png')" src="https://i.imgur.com/B9O6zF6.png" class="w-full bg-white border border-gray-200 rounded-xl p-3 cursor-pointer">
                <img onclick="addSticker('https://i.imgur.com/L1MhM2P.png')" src="https://i.imgur.com/L1MhM2P.png" class="w-full bg-white border border-gray-200 rounded-xl p-3 cursor-pointer">
                <img onclick="addSticker('https://i.imgur.com/R3O2b9S.png')" src="https://i.imgur.com/R3O2b9S.png" class="w-full bg-white border border-gray-200 rounded-xl p-3 cursor-pointer">
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaCLSapAY7-odkPz8f8Vct843Ub001UGVmj92dckJtOkCieCa7iDWvysf5BwXmM_Bo/exec";
        let isPreviewMode = false;
        let canvas;
        const C_W = 300; const C_H = 456;  
        const P_LEFT = 18; const P_TOP = 18; const P_WIDTH = 264; const P_HEIGHT = 338; 
        
        let isPolaroidLayout = true; 
        let isBeautyOn = false; // 追蹤美顏狀態
        let userImageObject; // 儲存使用者上傳的照片物件

        const PREMIUM_COLORS = ['#000000', '#595959', '#a6a6a6', '#d9d9d9', '#6d4c41', '#a1887f', '#d7ccc8', '#faf0e6', '#ef5350', '#f48fb1', '#fce4ec', '#fff0f5', '#1976d2', '#64b5f6', '#bbdefb', '#e6f7ff'];

        // --- 步驟一 ---
        document.getElementById('nextStepBtn').onclick = () => {
            const userNameInput = document.getElementById('userName');
            const orderIDInput = document.getElementById('orderID');
            if (!userNameInput.value.trim()) { document.getElementById('nameError').classList.remove('hidden'); userNameInput.classList.add('border-red-400'); return; }
            document.getElementById('nameError').classList.add('hidden'); userNameInput.classList.remove('border-red-400');
            if (!orderIDInput.value.trim()) { document.getElementById('orderModal').classList.remove('hidden'); } 
            else { isPreviewMode = false; unlockStep2(); }
        };
        function enterPreview() { document.getElementById('orderModal').classList.add('hidden'); isPreviewMode = true; unlockStep2(); }

        function unlockStep2() {
            document.getElementById('step1-container').classList.add('opacity-50', 'pointer-events-none');
            document.getElementById('step2-container').classList.remove('hidden');
            document.getElementById('submitBtn').classList.remove('hidden');
            setTimeout(() => { if (!canvas) initCanvas(); document.getElementById('step2-container').scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 50);
        }

        // --- 畫布系統 ---
        function initCanvas() {
            canvas = new fabric.Canvas('editorCanvas', { width: C_W, height: C_H, backgroundColor: '#ffffff', preserveObjectStacking: true });
            const palette = document.getElementById('colorPalette');
            PREMIUM_COLORS.forEach((color, index) => {
                const dot = document.createElement('div'); dot.className = `color-dot ${index === 0 ? 'active' : ''}`; dot.style.backgroundColor = color;
                dot.onclick = () => { document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); dot.classList.add('active'); setTextColor(color); };
                palette.appendChild(dot);
            });
            fabric.Object.prototype.set({ transparentCorners: false, cornerColor: '#fff', borderColor: '#000', cornerStrokeColor: '#000', cornerSize: 9, cornerStyle: 'circle' });
            const placeholder = new fabric.Rect({ id: 'placeholder', left: P_LEFT, top: P_TOP, width: P_WIDTH, height: P_HEIGHT, fill: '#f9fafb', stroke: '#e5e7eb', strokeDashArray: [3, 3], selectable: false, evented: false });
            canvas.add(placeholder);
            canvas.on('selection:created', onSelection); canvas.on('selection:updated', onSelection);
            canvas.on('selection:cleared', () => document.getElementById('objectTools').classList.add('hidden'));
        }

        function onSelection() {
            document.getElementById('objectTools').classList.remove('hidden');
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                document.getElementById('textTools').classList.remove('hidden');
                document.getElementById('fontFamily').value = activeObj.fontFamily;
            } else { document.getElementById('textTools').classList.add('hidden'); }
        }

        function toggleLayout() {
            isPolaroidLayout = !isPolaroidLayout;
            const btnText = document.getElementById('layoutText');
            btnText.innerText = isPolaroidLayout ? "目前: 拍立得白框" : "目前: 全滿版";
            const placeholder = canvas.getObjects().find(o => o.id === 'placeholder');
            if (placeholder) placeholder.set('opacity', isPolaroidLayout ? 1 : 0);
            if (userImageObject) {
                if (isPolaroidLayout) {
                    userImageObject.set('clipPath', new fabric.Rect({ left: P_LEFT, top: P_TOP, width: P_WIDTH, height: P_HEIGHT, absolutePositioned: true }));
                } else { userImageObject.set('clipPath', null); }
            }
            canvas.requestRenderAll();
        }

        document.getElementById('imageInput').onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    userImageObject = img; // 儲存物件
                    const scale = Math.max(P_WIDTH / img.width, P_HEIGHT / img.height);
                    img.set({ scaleX: scale, scaleY: scale, originX: 'center', originY: 'center', left: C_W / 2, top: P_TOP + (P_HEIGHT / 2) });
                    img.set('clipPath', new fabric.Rect({ left: P_LEFT, top: P_TOP, width: P_WIDTH, height: P_HEIGHT, absolutePositioned: true }));
                    canvas.add(img); canvas.sendToBack(img); canvas.bringForward(img); canvas.setActiveObject(img);
                });
            }; reader.readAsDataURL(file); e.target.value = '';
        };

        // --- 💣 修復與做好做滿修圖算法 ---

        // 1. 一鍵美顏 (智慧磨皮算法)
        function toggleBeauty() {
            if (!userImageObject) { alert("請先載入照片喔！"); return; }
            isBeautyOn = !isBeautyOn;
            const btn = document.getElementById('beautyBtn');
            btn.innerText = isBeautyOn ? "美顏 ON ✨" : "美顏 OFF";
            btn.classList.toggle('text-pink-500', isBeautyOn);
            btn.classList.toggle('border-pink-300', isBeautyOn);
            btn.classList.toggle('bg-pink-50', isBeautyOn);

            // 執行算法
            applyCompositeFilters();
        }

        // 2. 所見即所得高級調色算法
        function applyFilter(filterName, btn) {
            if (!userImageObject) { alert("請先載入照片喔！"); return; }
            document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            userImageObject.currentFilter = filterName; // 儲存目前濾鏡模式
            applyCompositeFilters(); // 執行合成
        }

        // 3. 核心：合成算法 (濾鏡 + 美顏 + 遮罩)
        function applyCompositeFilters() {
            if (!userImageObject) return;
            userImageObject.filters = []; // 清空

            const mode = userImageObject.currentFilter || 'Original';

            // 先套用美顏 (作為底層質感優化)
            if (isBeautyOn) {
                // 自動膚色優化 (提亮、降對比)
                userImageObject.filters.push(new fabric.Image.filters.Brightness({ brightness: 0.08 }));
                userImageObject.filters.push(new fabric.Image.filters.Contrast({ contrast: -0.1 }));
                // 💣 智慧磨皮算法：平滑捲積矩陣 (Convolve)
                // 捲積能填補小瑕疵 (痘痘、皺紋)，同時 Blend 色彩
                userImageObject.filters.push(new fabric.Image.filters.Convolve({
                    matrix: [
                        1/16, 2/16, 1/16,
                        2/16, 4/16, 2/16,
                        1/16, 2/16, 1/16
                    ]
                }));
            }

            // 再疊加高級調色濾鏡
            switch (mode) {
                case 'Original': break; 
                case 'KPop': 
                    userImageObject.filters.push(new fabric.Image.filters.Brightness({ brightness: 0.1 }));
                    userImageObject.filters.push(new fabric.Image.filters.Contrast({ contrast: 0.12 }));
                    userImageObject.filters.push(new fabric.Image.filters.BlendColor({ color: '#ffb6c1', mode: 'screen', alpha: 0.25 })); // 粉嫩
                    break;
                case 'BoyBand':
                    userImageObject.filters.push(new fabric.Image.filters.Contrast({ contrast: 0.2 }));
                    userImageObject.filters.push(new fabric.Image.filters.Saturation({ saturation: -0.2 }));
                    userImageObject.filters.push(new fabric.Image.filters.BlendColor({ color: '#607d8b', mode: 'multiply', alpha: 0.15 })); // 冷調
                    break;
                case 'Cool':
                    userImageObject.filters.push(new fabric.Image.filters.Brightness({ brightness: 0.15 }));
                    userImageObject.filters.push(new fabric.Image.filters.Contrast({ contrast: 0.1 }));
                    userImageObject.filters.push(new fabric.Image.filters.BlendColor({ color: '#e0f7fa', mode: 'screen', alpha: 0.2 })); // 冷白
                    break;
                case 'Film': // 💣 修復黑畫面Bug，改為高清底片感
                    userImageObject.filters.push(new fabric.Image.filters.Contrast({ contrast: 0.18 }));
                    userImageObject.filters.push(new fabric.Image.filters.Saturation({ saturation: 0.2 }));
                    userImageObject.filters.push(new fabric.Image.filters.Sepia());
                    userImageObject.filters.push(new fabric.Image.filters.BlendColor({ color: '#1a1a1a', mode: 'overlay', alpha: 0.15 })); // 黑霧感
                    break;
                case 'Vintage': userImageObject.filters.push(new fabric.Image.filters.Sepia()); userImageObject.filters.push(new fabric.Image.filters.Brightness({ brightness: -0.1 })); break;
                case 'Mono': userImageObject.filters.push(new fabric.Image.filters.Grayscale()); break;
                case 'Faded': userImageObject.filters.push(new fabric.Image.filters.Contrast({ contrast: -0.18 })); userImageObject.filters.push(new fabric.Image.filters.BlendColor({ color: '#f0ffff', mode: 'screen', alpha: 0.2 })); break;
                case 'Fresh': userImageObject.filters.push(new fabric.Image.filters.Saturation({ saturation: 0.18 })); userImageObject.filters.push(new fabric.Image.filters.Brightness({ brightness: 0.05 })); break;
            }

            userImageObject.applyFilters();
            canvas.requestRenderAll();
        }

        // 文字、貼紙
        function addText() {
            const text = new fabric.IText('輸入...', { left: C_W / 2, top: C_H - 50, fontFamily: 'Noto Sans TC', fontSize: 24, fill: '#000000', originX: 'center', originY: 'center' });
            canvas.add(text); canvas.bringToFront(text); canvas.setActiveObject(text);
        }
        function setTextColor(hex) { const obj = canvas.getActiveObject(); if (obj && obj.type === 'i-text') { obj.set('fill', hex); canvas.requestRenderAll(); } }
        document.getElementById('fontFamily').addEventListener('change', async function(e) { const obj = canvas.getActiveObject(); if (obj && obj.type === 'i-text') { await document.fonts.load(`16px "${e.target.value}"`); obj.set('fontFamily', e.target.value); canvas.requestRenderAll(); } });
        function openLibrary() { document.getElementById('libraryModal').classList.remove('hidden'); }
        function addSticker(url) { document.getElementById('libraryModal').classList.add('hidden'); fabric.Image.fromURL(url, (img) => { img.set({ scaleX: 0.25, scaleY: 0.25, originX: 'center', originY: 'center', left: C_W / 2, top: C_H / 2 }); canvas.add(img); canvas.bringToFront(img); canvas.setActiveObject(img); }); }

        // 排列
        function bringFront() { const obj = canvas.getActiveObject(); if(obj) { canvas.bringToFront(obj); canvas.requestRenderAll(); } }
        function sendBack() { const obj = canvas.getActiveObject(); if(obj) { canvas.sendToBack(obj); if(userImageObject) canvas.bringForward(userImageObject); canvas.requestRenderAll(); } }
        function deleteObj() { const obj = canvas.getActiveObject(); if(obj) { if(obj === userImageObject) userImageObject = null; canvas.remove(obj); canvas.discardActiveObject(); } }
        function clearCanvas() { if(confirm("確定重置？")) { canvas.clear(); canvas.setBackgroundColor('#ffffff'); initCanvas(); userImageObject = null; isBeautyOn = false; isPolaroidLayout = true; } }

        // 上傳 ( multipliers: 4 超高清)
        async function uploadDesign() {
            if (isPreviewMode) { alert("預覽中，請去蝦皮下單！"); return; }
            if (canvas.getObjects().length <= 1) { alert("請先加入設計！"); return; }
            const submitBtn = document.getElementById('submitBtn'); const statusMsg = document.getElementById('statusMsg');
            submitBtn.disabled = true; submitBtn.innerText = "打包高清檔案中...";
            statusMsg.innerText = "合併美顏與調色中..."; statusMsg.className = "mt-4 text-center text-sm tracking-wide text-blue-500 overflow-x-auto";
            canvas.discardActiveObject(); canvas.requestRenderAll();
            // 💣 超高清 4 倍輸出 (1200x1824)
            const base64Image = canvas.toDataURL({ format: 'png', multiplier: 4 });
            try {
                await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ userName: document.getElementById('userName').value.trim(), orderID: document.getElementById('orderID').value.trim() || "無", imageB64: base64Image }), mode: 'no-cors' });
                statusMsg.innerText = "✓ 設計已送達！"; statusMsg.className = "mt-4 text-center text-sm font-medium tracking-wide text-green-600 overflow-x-auto"; submitBtn.innerText = "完成";
            } catch (error) { statusMsg.innerText = "上傳失敗。"; statusMsg.innerText = "上傳失敗"; submitBtn.disabled = false; }
        }
    </script>
</body>
</html>
