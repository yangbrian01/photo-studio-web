<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO PHOTO STUDIO | 高級美感工作室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Roboto:wght@300;400&family=Caveat:wght@600&family=Zeyada&family=Special+Elite&family=Playfair+Display:ital@0;1&display=swap');
        
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #f8f9fa; overscroll-behavior: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* 畫布陰影與質感 */
        .canvas-container { margin: 0 auto; box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-radius: 4px; background-color: white; }

        /* 屬性面板的小控制方塊 */
        .color-dot { width: 22px; height: 22px; cursor: pointer; border-radius: 50%; border: 1px solid #e5e7eb; transition: all 0.2s; }
        .color-dot:hover { transform: scale(1.15); box-shadow: 0 0 5px rgba(0,0,0,0.1); }
        .color-dot.active { border: 2px solid #000; box-shadow: 0 0 5px rgba(0,0,0,0.2); }

        /* 濾鏡選取區樣式 */
        .filter-item { border-radius: 8px; border: 1px solid #e5e7eb; cursor: pointer; transition: all 0.2s; background-color: white; padding: 4px; }
        .filter-item:hover { background-color: #f3f4f6; border-color: #d1d5db; }
        .filter-item.active { border-color: #000; background-color: #f8f9fa; }
    </style>
</head>
<body class="text-gray-900 antialiased relative py-10">

    <div class="max-w-3xl mx-auto px-6">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-light tracking-[0.3em] uppercase mb-2 text-gray-800">Pro Studio</h1>
            <p class="text-gray-400 text-xs tracking-widest font-light">Xiaomi Pro 2x3" 高級客製化</p>
        </header>

        <div id="step1-container" class="bg-white rounded-2xl shadow-sm p-8 mb-6 border border-gray-100 transition-all">
            <h2 class="text-base font-medium mb-6 flex items-center tracking-wider text-gray-700">
                <span class="w-6 h-6 shrink-0 bg-black text-white rounded-full text-xs flex items-center justify-center mr-3 font-normal">1</span>
                填寫訂單資訊
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <input type="text" id="userName" placeholder="蝦皮帳號 / 姓名 (必填)" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-black transition font-light text-sm">
                    <p id="nameError" class="text-red-500 text-xs mt-1 hidden tracking-wide">請填寫您的稱呼或帳號</p>
                </div>
                <input type="text" id="orderID" placeholder="蝦皮訂單編號" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-black transition font-light text-sm">
            </div>
            <button id="nextStepBtn" class="w-full bg-gray-900 text-white py-3.5 rounded-xl font-light tracking-widest hover:bg-black transition text-sm shadow-md">
                進入線上設計
            </button>
        </div>

        <div id="step2-container" class="bg-white rounded-2xl shadow-sm border border-gray-100 hidden fade-in overflow-hidden">
            
            <div class="bg-gray-100/50 py-10 relative flex justify-center border-b border-gray-50">
                <canvas id="editorCanvas"></canvas>
            </div>

            <div id="objectTools" class="px-6 py-4 bg-white hidden flex justify-between gap-6 transition border-b border-gray-50 relative z-10">
                <div class="flex gap-4 items-center">
                    <div class="flex gap-1.5 border border-gray-100 p-1 rounded-lg bg-gray-50/50">
                        <button onclick="bringFront()" title="上移一層" class="w-9 h-9 text-gray-500 hover:text-black hover:bg-white rounded-md flex flex-col items-center justify-center gap-0.5"><i class="fa-solid fa-layer-group"></i><span class="text-[9px]">上層</span></button>
                        <button onclick="sendBack()" title="下移一層" class="w-9 h-9 text-gray-500 hover:text-black hover:bg-white rounded-md flex flex-col items-center justify-center gap-0.5"><i class="fa-solid fa-layer-group fa-flip-vertical"></i><span class="text-[9px]">下層</span></button>
                    </div>
                </div>

                <div id="textTools" class="hidden flex-1 flex gap-5 items-center justify-center">
                    <select id="fontFamily" class="text-xs px-3 py-1.5 border border-gray-100 rounded-lg focus:outline-none focus:border-black font-light tracking-wide bg-gray-50/50">
                        <option value="Caveat" selected>手寫風格 (Caveat)</option>
                        <option value="Zeyada">文青極細 (Zeyada)</option>
                        <option value="Special Elite">復古打字機 (Elite)</option>
                        <option value="Playfair Display">高級雜誌 (Playfair)</option>
                    </select>
                    <div class="flex-1 max-w-sm border border-gray-100 p-2 rounded-xl bg-gray-50/50">
                        <label class="text-[10px] text-gray-400 font-light mb-1.5 block tracking-widest text-center">手寫色盤</label>
                        <div class="grid grid-cols-8 gap-1.5 justify-items-center" id="colorPalette">
                            </div>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <button onclick="deleteObj()" class="w-10 h-10 bg-red-50 text-red-400 hover:text-red-600 hover:bg-red-100 rounded-xl transition"><i class="fa-regular fa-trash-can"></i></button>
                </div>
            </div>

            <div class="px-6 py-5 bg-white space-y-5">
                <div class="p-4 border border-gray-100 rounded-xl bg-gray-50/50">
                    <label class="text-[11px] text-gray-400 font-medium mb-3 block tracking-widest text-center">拍立得風格濾鏡 (僅適用於照片)</label>
                    <div class="grid grid-cols-5 gap-3 max-w-lg mx-auto">
                        <button onclick="applyFilter('Original', this)" class="filter-item active text-center">
                            <img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-8 object-cover rounded mb-1 grayscale-0" alt="Original">
                            <span class="text-[10px] font-light">Original</span>
                        </button>
                        <button onclick="applyFilter('Vintage', this)" class="filter-item text-center">
                            <img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-8 object-cover rounded mb-1 sepia" alt="Vintage">
                            <span class="text-[10px] font-light">Vintage</span>
                        </button>
                        <button onclick="applyFilter('Mono', this)" class="filter-item text-center">
                            <img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-8 object-cover rounded mb-1 grayscale" alt="Mono">
                            <span class="text-[10px] font-light">Mono</span>
                        </button>
                        <button onclick="applyFilter('Faded', this)" class="filter-item text-center">
                            <img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-8 object-cover rounded mb-1 opacity-80" alt="Faded">
                            <span class="text-[10px] font-light">Faded</span>
                        </button>
                        <button onclick="applyFilter('Fresh', this)" class="filter-item text-center">
                            <img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-8 object-cover rounded mb-1 hue-rotate-15" alt="Fresh">
                            <span class="text-[10px] font-light">Fresh</span>
                        </button>
                    </div>
                </div>

                <div class="flex justify-around items-center max-w-md mx-auto">
                    <label class="flex flex-col items-center gap-1.5 cursor-pointer text-gray-600 hover:text-black transition">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg"><i class="fa-regular fa-image"></i></div>
                        <span class="text-xs font-light tracking-wide">載入照片</span>
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                    </label>
                    <button onclick="addText()" class="flex flex-col items-center gap-1.5 text-gray-600 hover:text-black transition">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg"><i class="fa-solid fa-t"></i></div>
                        <span class="text-xs font-light tracking-wide">新增文字</span>
                    </button>
                    <button onclick="clearCanvas()" class="flex flex-col items-center gap-1.5 text-red-300 hover:text-red-500 transition">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg"><i class="fa-solid fa-rotate-left"></i></div>
                        <span class="text-xs font-light tracking-wide">清空畫布</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="max-w-xs mx-auto mt-6">
            <button id="submitBtn" onclick="uploadDesign()" class="w-full bg-black text-white py-4 rounded-xl font-light tracking-[0.2em] hover:bg-gray-800 transition duration-300 text-sm hidden fade-in shadow-xl">
                確認並上傳設計
            </button>
            <p id="statusMsg" class="mt-4 text-center text-sm font-light tracking-wide"></p>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center hidden fade-in backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full mx-4 text-center overflow-x-auto">
            <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-4"><span class="text-xl">🛒</span></div>
            <h3 class="text-lg font-medium text-gray-900 mb-2 tracking-wide overflow-x-auto overflow-x-auto">尚未填寫訂單編號</h3>
            <p class="text-sm text-gray-500 font-light mb-6 leading-relaxed overflow-x-auto">建議您先至蝦皮賣場完成下單，以利工作室為您安排印製。</p>
            <div class="space-y-3">
                <button onclick="alert('前往蝦皮')" class="w-full bg-black text-white py-3 rounded-xl font-light tracking-widest text-sm overflow-x-auto overflow-x-auto">前往蝦皮下單</button>
                <button onclick="enterPreview()" class="w-full bg-white text-gray-500 border border-gray-200 py-3 rounded-xl font-light tracking-widest text-sm overflow-x-auto">我只想先預覽效果</button>
                <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="text-xs text-gray-400 mt-2 hover:text-gray-600 overflow-x-auto">返回修改</button>
            </div>
        </div>
    </div>

    <script>
        // === GAS 配置與物理比例 ===
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaCLSapAY7-odkPz8f8Vct843Ub001UGVmj92dckJtOkCieCa7iDWvysf5BwXmM_Bo/exec";
        let isPreviewMode = false;
        let canvas;
        
        const C_W = 300;  // 寬 50mm
        const C_H = 456;  // 高 76mm

        const P_LEFT = 18;
        const P_TOP = 18;
        const P_WIDTH = 264; // C_W - P_LEFT * 2
        const P_HEIGHT = 338; // C_H - P_TOP - 留白(100)

        // 精選 16 色高級色盤 (莫蘭迪色、大地色系)
        const PREMIUM_COLORS = [
            '#000000', '#595959', '#a6a6a6', '#d9d9d9', // 黑灰白
            '#6d4c41', '#a1887f', '#d7ccc8', '#faf0e6', // 大地、莫蘭迪棕
            '#ef5350', '#f48fb1', '#fce4ec', '#fff0f5', // 乾燥花粉、紅
            '#1976d2', '#64b5f6', '#bbdefb', '#e6f7ff'  // 莫蘭迪藍、天藍
        ];

        // --- 步驟一邏輯 (顏值回歸) ---
        document.getElementById('nextStepBtn').onclick = () => {
            const userNameInput = document.getElementById('userName');
            const orderIDInput = document.getElementById('orderID');
            const nameError = document.getElementById('nameError');
            
            if (!userNameInput.value.trim()) {
                nameError.classList.remove('hidden');
                userNameInput.classList.add('border-red-400');
                return;
            }
            nameError.classList.add('hidden');
            userNameInput.classList.remove('border-red-400');

            if (!orderIDInput.value.trim()) {
                document.getElementById('orderModal').classList.remove('hidden');
            } else {
                isPreviewMode = false;
                unlockStep2();
            }
        };

        function enterPreview() {
            document.getElementById('orderModal').classList.add('hidden');
            isPreviewMode = true;
            unlockStep2();
        }

        function unlockStep2() {
            document.getElementById('step1-container').classList.add('opacity-50', 'pointer-events-none');
            document.getElementById('step2-container').classList.remove('hidden');
            document.getElementById('submitBtn').classList.remove('hidden');

            if (isPreviewMode) {
                document.getElementById('modeBadge').classList.remove('hidden');
                document.getElementById('submitBtn').innerText = "預覽完成，請前往蝦皮下單";
                document.getElementById('submitBtn').classList.replace('bg-black', 'bg-gray-400');
            }

            if (!canvas) initCanvas();
            document.getElementById('step2-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // --- 畫布與編輯器系統 (完全體) ---
        function initCanvas() {
            canvas = new fabric.Canvas('editorCanvas', {
                width: C_W, height: C_H, backgroundColor: '#ffffff', preserveObjectStacking: true
            });

            // 初始化色盤 UI
            const palette = document.getElementById('colorPalette');
            PREMIUM_COLORS.forEach((color, index) => {
                const dot = document.createElement('div');
                dot.className = `color-dot ${index === 0 ? 'active' : ''}`;
                dot.style.backgroundColor = color;
                dot.onclick = () => {
                    // UI 切換
                    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');
                    // 功能切換
                    setTextColor(color);
                };
                palette.appendChild(dot);
            });

            // 物件控制項美化 (Canva 風格)
            fabric.Object.prototype.set({
                transparentCorners: false, cornerColor: '#fff', borderColor: '#000', cornerStrokeColor: '#000', cornerSize: 9, cornerStyle: 'circle'
            });

            // 底部照片提示框
            const placeholder = new fabric.Rect({
                left: P_LEFT, top: P_TOP, width: P_WIDTH, height: P_HEIGHT, fill: '#f9fafb', stroke: '#e5e7eb', strokeDashArray: [3, 3], selectable: false, evented: false
            });
            canvas.add(placeholder);

            // 監聽物件選取 (智慧工具列)
            canvas.on('selection:created', onSelection);
            canvas.on('selection:updated', onSelection);
            canvas.on('selection:cleared', () => {
                document.getElementById('objectTools').classList.add('hidden');
            });
        }

        // 當選取物件時：顯示工具列，判斷文字還是照片
        function onSelection(e) {
            document.getElementById('objectTools').classList.remove('hidden');
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                document.getElementById('textTools').classList.remove('hidden');
            } else {
                document.getElementById('textTools').classList.add('hidden');
            }
        }

        // 功能：照片匯入與裁切
        document.getElementById('imageInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    const scale = Math.max(P_WIDTH / img.width, P_HEIGHT / img.height);
                    img.set({
                        scaleX: scale, scaleY: scale, originX: 'center', originY: 'center',
                        left: C_W / 2, top: P_TOP + (P_HEIGHT / 2),
                        frameId: 'userImage' // 標記它是照片
                    });
                    // 加入裁切遮罩
                    const clipPath = new fabric.Rect({ left: P_LEFT, top: P_TOP, width: P_WIDTH, height: P_HEIGHT, absolutePositioned: true });
                    img.set('clipPath', clipPath);
                    
                    canvas.add(img);
                    // 確保照片在placeholder上面，文字下方
                    canvas.sendToBack(img);
                    canvas.bringForward(img); 
                    canvas.setActiveObject(img);
                });
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        };

        // 功能：文字功能大升級
        function addText() {
            const text = new fabric.IText('Hello :)', {
                left: C_W / 2, top: C_H - 50, // 設在厚邊框處
                fontFamily: 'Caveat', fontSize: 32, fill: '#000000', originX: 'center', originY: 'center'
            });
            canvas.add(text);
            canvas.bringToFront(text);
            canvas.setActiveObject(text);
        }

        function setTextColor(hex) {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') {
                obj.set('fill', hex);
                canvas.requestRenderAll();
            }
        }

        // 字體選取監聽
        document.getElementById('fontFamily').addEventListener('change', function(e) {
            const obj = canvas.getActiveObject();
            if (obj && obj.type === 'i-text') {
                obj.set('fontFamily', e.target.value);
                canvas.requestRenderAll();
            }
        });

        // 功能：濾鏡工具大升級 (前端實作 algorithm)
        // 注意：Fabric.js 濾鏡是異步的
        function applyFilter(filterName, btn) {
            // UI 切換
            document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // 功能：找到畫布上的照片，套用濾鏡
            const objects = canvas.getObjects();
            const imgObj = objects.find(obj => obj.frameId === 'userImage');
            
            if (!imgObj) return;

            // 清空舊濾鏡
            imgObj.filters = [];

            // 濾鏡算法組合
            switch (filterName) {
                case 'Original': break; // 清空即可
                case 'Vintage': 
                    // Sepia + Brightness 下降
                    imgObj.filters.push(new fabric.Image.filters.Sepia());
                    imgObj.filters.push(new fabric.Image.filters.Brightness({ brightness: -0.1 }));
                    break;
                case 'Mono': 
                    imgObj.filters.push(new fabric.Image.filters.Grayscale());
                    break;
                case 'Faded': 
                    // Lower contrast + Add blue tone
                    imgObj.filters.push(new fabric.Image.filters.Contrast({ contrast: -0.15 }));
                    imgObj.filters.push(new fabric.Image.filters.BlendColor({ color: '#e0ffff', mode: 'screen', alpha: 0.2 }));
                    break;
                case 'Fresh': 
                    // Higher saturation + Sligthly boost brightness
                    imgObj.filters.push(new fabric.Image.filters.Saturation({ saturation: 0.15 }));
                    imgObj.filters.push(new fabric.Image.filters.Brightness({ brightness: 0.05 }));
                    break;
            }

            // 執行濾鏡並重新渲染
            imgObj.applyFilters();
            canvas.requestRenderAll();
        }

        // 功能：物件排列控制
        function bringFront() { const obj = canvas.getActiveObject(); if(obj) { canvas.bringToFront(obj); canvas.requestRenderAll(); } }
        function sendBack() { const obj = canvas.getActiveObject(); if(obj) { canvas.sendToBack(obj); canvas.bringForward(obj); canvas.requestRenderAll(); } }
        function deleteObj() { const obj = canvas.getActiveObject(); if(obj) { canvas.remove(obj); canvas.discardActiveObject(); } }
        function clearCanvas() { if(confirm("確定要清空設計？")) { canvas.clear(); canvas.setBackgroundColor('#ffffff'); initCanvas(); } }

        // --- 上傳 GAS (完全體) ---
        async function uploadDesign() {
            if (isPreviewMode) { alert("您目前處於預覽模式，系統不會儲存照片。\n請至蝦皮賣場下單取得訂單編號後，重新整理網頁填寫上傳！"); return; }
            
            if (canvas.getObjects().length <= 1) { alert("請先加入照片或設計文字！"); return; }

            const submitBtn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMsg');

            submitBtn.disabled = true;
            submitBtn.innerText = "正在打包設計成品...";
            statusMsg.innerText = "正在封裝高清圖檔 (套用濾鏡中)...";
            statusMsg.className = "mt-4 text-center text-sm tracking-wide text-blue-500 overflow-x-auto";

            // 匯出前取消所有選取狀態
            canvas.discardActiveObject();
            canvas.requestRenderAll();

            // 取得高清 2x3 成品圖 (multiplier: 3 放大解析度，900x1368)
            const base64Image = canvas.toDataURL({ format: 'png', multiplier: 3 });

            const payload = {
                userName: document.getElementById('userName').value.trim(),
                orderID: document.getElementById('orderID').value.trim() || "無",
                imageB64: base64Image
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify(payload),
                    mode: 'no-cors'
                });
                statusMsg.innerText = "✓ 成功！您的設計已送達工作室。";
                statusMsg.className = "mt-4 text-center text-sm font-medium tracking-wide text-green-600 overflow-x-auto overflow-x-auto";
                submitBtn.innerText = "上傳完成";
            } catch (error) {
                statusMsg.innerText = "上傳失敗，請檢查網路。";
                statusMsg.className = "mt-4 text-center text-sm tracking-wide text-red-500 overflow-x-auto";
                submitBtn.innerText = "確認並上傳設計";
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
