<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO PHOTO STUDIO | 高品質影像處理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Roboto:wght@300;400&display=swap');
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #f8f9fa; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* 讓畫布置中並加上好看的陰影 */
        .canvas-container { margin: 0 auto; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body class="text-gray-900 antialiased relative">

    <div class="max-w-2xl mx-auto px-6 py-12">
        <header class="text-center mb-14 mt-4">
            <h1 class="text-3xl md:text-4xl font-light tracking-[0.3em] uppercase mb-3 text-gray-800">
                PRO PHOTO STUDIO
            </h1>
            <p class="text-gray-500 text-sm tracking-widest font-light">
                Xiaomi Pro 熱昇華高品質影像處理系統
            </p>
        </header>

        <div id="step1-container" class="bg-white rounded-2xl shadow-sm p-8 mb-6 border border-gray-100 transition-all">
            <h2 class="text-lg font-medium mb-6 flex items-center tracking-wide">
                <span class="w-6 h-6 bg-black text-white rounded-full text-xs flex items-center justify-center mr-3 font-normal">1</span>
                填寫訂單資訊
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <input type="text" id="userName" placeholder="蝦皮帳號 / 姓名 (必填)" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-black transition font-light text-sm">
                    <p id="nameError" class="text-red-500 text-xs mt-1 hidden tracking-wide">請填寫您的稱呼或帳號</p>
                </div>
                <input type="text" id="orderID" placeholder="蝦皮訂單編號" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-black transition font-light text-sm">
            </div>
            
            <button id="nextStepBtn" class="w-full bg-gray-900 text-white py-3 rounded-xl font-light tracking-widest hover:bg-black transition duration-300 text-sm mt-2">
                下一步：編輯照片
            </button>
        </div>

        <div id="step2-container" class="bg-white rounded-2xl shadow-sm p-8 mb-6 border border-gray-100 hidden fade-in">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-medium flex items-center tracking-wide">
                    <span class="w-6 h-6 bg-black text-white rounded-full text-xs flex items-center justify-center mr-3 font-normal">2</span>
                    編輯設計 (2:3 畫布)
                </h2>
                <span id="modeBadge" class="text-xs px-3 py-1 bg-gray-100 text-gray-500 rounded-full tracking-wider hidden">預覽模式</span>
            </div>
            
            <label class="block mb-6">
                <div class="flex items-center justify-center w-full h-24 border-2 border-dashed border-gray-200 rounded-2xl cursor-pointer hover:bg-gray-50 transition">
                    <div class="text-center">
                        <span class="text-gray-400 text-sm font-light tracking-wide">+ 點擊上傳照片</span>
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                    </div>
                </div>
            </label>

            <div id="editorSection" class="hidden">
                <div class="bg-gray-50 p-4 rounded-xl mb-6">
                    <canvas id="editorCanvas"></canvas>
                </div>
                
                <div class="flex justify-center space-x-3">
                    <button onclick="addText()" class="px-5 py-2 text-xs border border-gray-200 rounded-full hover:bg-gray-100 tracking-wide font-light transition">
                        ✎ 新增文字
                    </button>
                    <button onclick="deleteSelected()" class="px-5 py-2 text-xs border border-red-200 text-red-500 rounded-full hover:bg-red-50 tracking-wide font-light transition">
                        🗑 刪除選取
                    </button>
                </div>
            </div>
        </div>

        <button id="submitBtn" class="w-full bg-black text-white py-4 rounded-2xl font-light tracking-[0.2em] hover:bg-gray-800 transition duration-300 text-sm hidden fade-in">
            確認並上傳至工作室
        </button>

        <p id="statusMsg" class="mt-4 text-center text-sm font-light tracking-wide"></p>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center hidden fade-in backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full mx-4 text-center">
            <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-4">
                <span class="text-xl">🛒</span>
            </div>
            <h3 class="text-lg font-medium text-gray-900 mb-2 tracking-wide">尚未填寫訂單編號</h3>
            <p class="text-sm text-gray-500 font-light mb-6 leading-relaxed">
                系統偵測到您尚未填寫訂單編號。<br>建議您先至蝦皮賣場完成下單，以利工作室為您安排印製。
            </p>
            <div class="space-y-3">
                <button onclick="goToShopee()" class="w-full bg-black text-white py-3 rounded-xl font-light tracking-widest text-sm hover:bg-gray-800 transition">
                    前往蝦皮賣場下單
                </button>
                <button onclick="enterPreviewMode()" class="w-full bg-white text-gray-500 border border-gray-200 py-3 rounded-xl font-light tracking-widest text-sm hover:bg-gray-50 transition">
                    我只想先預覽編輯效果
                </button>
                <button onclick="closeModal()" class="text-xs text-gray-400 mt-2 hover:text-gray-600 tracking-wide">
                    返回修改訂單資訊
                </button>
            </div>
        </div>
    </div>

    <script>
        // 你的 GAS 網址
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaCLSapAY7-odkPz8f8Vct843Ub001UGVmj92dckJtOkCieCa7iDWvysf5BwXmM_Bo/exec";

        let isPreviewMode = false; 
        let canvas; // Fabric 畫布變數

        // 初始化畫布 (2:3 比例)
        function initCanvas() {
            if (!canvas) {
                canvas = new fabric.Canvas('editorCanvas', {
                    width: 300,
                    height: 450,
                    backgroundColor: '#ffffff'
                });
            }
        }

        // --- 步驟 1 邏輯 (完全沒變) ---
        const step1Container = document.getElementById('step1-container');
        const step2Container = document.getElementById('step2-container');
        const nextStepBtn = document.getElementById('nextStepBtn');
        const userNameInput = document.getElementById('userName');
        const orderIDInput = document.getElementById('orderID');
        const nameError = document.getElementById('nameError');
        const submitBtn = document.getElementById('submitBtn');
        const orderModal = document.getElementById('orderModal');
        const modeBadge = document.getElementById('modeBadge');

        nextStepBtn.onclick = () => {
            const userName = userNameInput.value.trim();
            const orderID = orderIDInput.value.trim();

            if (!userName) {
                nameError.classList.remove('hidden');
                userNameInput.classList.add('border-red-400');
                return;
            } else {
                nameError.classList.add('hidden');
                userNameInput.classList.remove('border-red-400');
            }

            if (!orderID) {
                orderModal.classList.remove('hidden');
            } else {
                isPreviewMode = false;
                unlockStep2();
            }
        };

        function closeModal() { orderModal.classList.add('hidden'); }
        function goToShopee() { alert("前往蝦皮賣場..."); }
        function enterPreviewMode() {
            closeModal();
            isPreviewMode = true;
            unlockStep2();
        }

        function unlockStep2() {
            step1Container.classList.add('opacity-50', 'pointer-events-none');
            step2Container.classList.remove('hidden');
            submitBtn.classList.remove('hidden');

            if (isPreviewMode) {
                modeBadge.classList.remove('hidden');
                submitBtn.innerText = "預覽滿意嗎？請前往蝦皮完成下單";
                submitBtn.classList.replace('bg-black', 'bg-gray-400');
            } else {
                modeBadge.classList.add('hidden');
                submitBtn.innerText = "確認並上傳至工作室";
                submitBtn.classList.replace('bg-gray-400', 'bg-black');
            }
            step2Container.scrollIntoView({ behavior: 'smooth', block: 'start' });
            
            // 解鎖步驟 2 時，初始化畫布
            initCanvas();
        }

        // --- 步驟 2：Fabric.js 編輯邏輯 ---
        document.getElementById('imageInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('editorSection').classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = function(f) {
                const data = f.target.result;
                fabric.Image.fromURL(data, function(img) {
                    // 自動縮放照片適應畫布
                    const scale = (300 * 0.9) / img.width;
                    img.set({
                        scaleX: scale, scaleY: scale,
                        cornerStyle: 'circle', cornerColor: 'black', borderColor: 'black', transparentCorners: false
                    });
                    canvas.centerObject(img);
                    canvas.add(img);
                    canvas.setActiveObject(img);
                });
            };
            reader.readAsDataURL(file);
            e.target.value = ''; // 允許重複上傳
        };

        function addText() {
            const text = new fabric.IText('點擊修改文字', {
                left: 150, top: 225,
                fontFamily: 'Noto Sans TC', fontSize: 24, fill: '#000000',
                originX: 'center', originY: 'center',
                cornerStyle: 'circle', cornerColor: 'black', borderColor: 'black', transparentCorners: false
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        function deleteSelected() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(function(object) { canvas.remove(object); });
            }
        }

        // --- 步驟 3：上傳邏輯 (還原上傳到 GAS) ---
        submitBtn.onclick = async () => {
            if (isPreviewMode) {
                alert("您目前處於預覽模式，系統不會儲存照片。\n請至蝦皮賣場下單取得訂單編號後，重新整理網頁填寫上傳！");
                return;
            }

            // 檢查畫布是否有內容
            if (canvas.getObjects().length === 0) {
                alert("請先上傳照片或加入設計");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "處理中...";
            document.getElementById('statusMsg').innerText = "正在處理影像並上傳...";
            document.getElementById('statusMsg').className = "mt-4 text-center text-sm text-blue-500 tracking-wide";

            // 匯出前取消選取物件 (才不會把控制框也印出來)
            canvas.discardActiveObject();
            canvas.requestRenderAll();

            // 取得高畫質 Base64 (multiplier: 3 放大三倍解析度)
            const base64Image = canvas.toDataURL({ format: 'png', multiplier: 3 });

            const payload = {
                userName: userNameInput.value.trim(),
                orderID: orderIDInput.value.trim(),
                imageB64: base64Image
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify(payload),
                    mode: 'no-cors'
                });
                document.getElementById('statusMsg').innerText = "✓ 成功！照片已送達工作室。";
                document.getElementById('statusMsg').className = "mt-4 text-center text-sm text-gray-800 font-medium tracking-wide";
                submitBtn.innerText = "上傳完成";
            } catch (error) {
                document.getElementById('statusMsg').innerText = "上傳失敗，請檢查網路。";
                document.getElementById('statusMsg').className = "mt-4 text-center text-sm text-red-500 tracking-wide";
                submitBtn.innerText = "確認並上傳至工作室";
                submitBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
