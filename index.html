<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO PHOTO STUDIO | 專屬拍立得</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Caveat:wght@500;600&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f0f2f5; 
            overscroll-behavior: none; /* 防止手機下拉重整 */
        }
        
        /* 拍立得畫布的實體陰影感 */
        .canvas-container { 
            margin: 0 auto; 
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15), 0 5px 10px rgba(0,0,0,0.05);
            border-radius: 4px; 
            background-color: white;
            transition: transform 0.3s ease;
        }

        /* 隱藏一開始的編輯區 */
        .hidden-step { display: none; opacity: 0; transition: opacity 0.5s ease; }
        .show-step { display: block; opacity: 1; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col items-center py-10 px-4">

    <header class="text-center mb-10 w-full max-w-md">
        <h1 class="text-2xl font-light tracking-[0.4em] mb-2 uppercase text-gray-900">Pro Studio</h1>
        <p class="text-xs tracking-widest text-gray-400 font-light">2x3" Polaroid Editor</p>
    </header>

    <div id="step1" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-sm border border-gray-100 show-step">
        <h2 class="text-base font-medium mb-6 tracking-wider text-center">請先輸入訂單資訊</h2>
        <div class="space-y-4 mb-6">
            <input type="text" id="userName" placeholder="蝦皮帳號 / 姓名" class="w-full px-4 py-3 rounded-xl bg-gray-50 border-transparent focus:bg-white focus:border-gray-300 focus:ring-0 transition text-sm tracking-wide">
            <input type="text" id="orderID" placeholder="蝦皮訂單編號 (選填)" class="w-full px-4 py-3 rounded-xl bg-gray-50 border-transparent focus:bg-white focus:border-gray-300 focus:ring-0 transition text-sm tracking-wide">
        </div>
        <button onclick="goToStep2()" class="w-full bg-black text-white py-3.5 rounded-xl font-light tracking-widest hover:bg-gray-800 transition text-sm">
            進入設計畫布
        </button>
    </div>

    <div id="step2" class="w-full max-w-md hidden-step">
        
        <div class="mb-8 relative flex justify-center">
            <canvas id="editorCanvas"></canvas>
            
            <div id="uploadHint" class="absolute top-[160px] pointer-events-none flex flex-col items-center text-gray-400 opacity-60">
                <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="text-xs font-light tracking-widest">點擊下方載入照片</span>
            </div>
        </div>

        <div class="bg-white p-2 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center mb-6">
            <div class="flex gap-2">
                <label class="w-12 h-12 flex items-center justify-center bg-gray-50 hover:bg-gray-100 text-gray-700 rounded-xl cursor-pointer transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    <input type="file" id="imageInput" accept="image/*" class="hidden">
                </label>
                <button onclick="addText()" class="w-12 h-12 flex items-center justify-center bg-gray-50 hover:bg-gray-100 text-gray-700 rounded-xl transition">
                    <span class="font-serif text-lg font-bold italic">T</span>
                </button>
            </div>
            
            <button onclick="deleteSelected()" class="w-12 h-12 flex items-center justify-center text-red-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
        </div>

        <button id="submitBtn" onclick="uploadDesign()" class="w-full bg-black text-white py-4 rounded-xl font-light tracking-[0.2em] hover:bg-gray-800 transition shadow-md text-sm">
            確認並上傳印製
        </button>
        <p id="statusMsg" class="mt-4 text-center text-xs font-light tracking-wide text-gray-500"></p>
    </div>

    <script>
        // --- 設定 GAS 網址 ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaCLSapAY7-odkPz8f8Vct843Ub001UGVmj92dckJtOkCieCa7iDWvysf5BwXmM_Bo/exec";

        let canvas;
        const CANVAS_WIDTH = 300;
        const CANVAS_HEIGHT = 456; // 完美 50x76mm (1:1.52) 比例

        // 定義拍立得照片的「顯示區域」(遮罩)
        // 留白設定：左右上各留 18px，下方留 100px 寫字
        const PHOTO_LEFT = 18;
        const PHOTO_TOP = 18;
        const PHOTO_WIDTH = CANVAS_WIDTH - (PHOTO_LEFT * 2); // 264px
        const PHOTO_HEIGHT = CANVAS_HEIGHT - PHOTO_TOP - 100; // 338px

        // --- 步驟切換邏輯 ---
        function goToStep2() {
            const userName = document.getElementById('userName').value.trim();
            if (!userName) {
                alert("請填寫蝦皮帳號或姓名喔！");
                return;
            }
            document.getElementById('step1').classList.remove('show-step');
            setTimeout(() => {
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                // 觸發重繪以防排版跑掉
                setTimeout(() => {
                    document.getElementById('step2').classList.add('show-step');
                    if (!canvas) initCanvas();
                }, 50);
            }, 300);
        }

        // --- 初始化 Fabric 畫布 ---
        function initCanvas() {
            canvas = new fabric.Canvas('editorCanvas', {
                width: CANVAS_WIDTH,
                height: CANVAS_HEIGHT,
                backgroundColor: '#ffffff' // 拍立得相紙底色
            });

            // 調整控制項外觀 (讓它看起來專業，像 Canva)
            fabric.Object.prototype.set({
                transparentCorners: false,
                cornerColor: '#ffffff',
                cornerStrokeColor: '#000000',
                borderColor: '#000000',
                cornerSize: 10,
                padding: 0,
                cornerStyle: 'circle',
                borderDashArray: [4, 4]
            });

            // 畫一個淺灰色的底框，提示使用者照片會出現在這裡
            const placeholder = new fabric.Rect({
                left: PHOTO_LEFT, top: PHOTO_TOP,
                width: PHOTO_WIDTH, height: PHOTO_HEIGHT,
                fill: '#f8f9fa',
                stroke: '#e5e7eb',
                strokeWidth: 1,
                selectable: false, evented: false
            });
            canvas.add(placeholder);
        }

        // --- 功能：匯入照片並自動遮罩 ---
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 隱藏上傳提示字
            document.getElementById('uploadHint').style.display = 'none';

            const reader = new FileReader();
            reader.onload = function(f) {
                fabric.Image.fromURL(f.target.result, function(img) {
                    
                    // 1. 自動縮放照片，讓短邊填滿顯示區域
                    const scale = Math.max(PHOTO_WIDTH / img.width, PHOTO_HEIGHT / img.height);
                    img.set({
                        scaleX: scale,
                        scaleY: scale,
                        originX: 'center', 
                        originY: 'center',
                        left: PHOTO_LEFT + (PHOTO_WIDTH / 2),
                        top: PHOTO_TOP + (PHOTO_HEIGHT / 2)
                    });

                    // 2. 核心技術：加入裁切遮罩 (Clip Path)
                    // 這會讓照片被死死限制在指定的框框內，拖到白邊就會隱形！
                    const clipPath = new fabric.Rect({
                        left: PHOTO_LEFT - img.left, // 相對座標算法
                        top: PHOTO_TOP - img.top,
                        width: PHOTO_WIDTH,
                        height: PHOTO_HEIGHT,
                        originX: 'center', originY: 'center',
                        absolutePositioned: true
                    });
                    img.set('clipPath', clipPath);

                    // 加入畫布並選取
                    canvas.add(img);
                    // 確保照片在文字的下層
                    img.sendToBack(); 
                    // 但要比淺灰色底框高一層
                    canvas.bringForward(img); 
                    canvas.setActiveObject(img);
                });
            };
            reader.readAsDataURL(file);
            e.target.value = ''; // 允許重複選取
        });

        // --- 功能：新增手寫風文字 ---
        function addText() {
            const text = new fabric.IText('Double Click', {
                left: CANVAS_WIDTH / 2,
                top: CANVAS_HEIGHT - 50, // 預設出現在下方留白處
                fontFamily: 'Caveat', // 英文手寫字體 (中文會退回預設)
                fontSize: 28,
                fill: '#1f2937',
                originX: 'center', originY: 'center'
            });
            canvas.add(text);
            canvas.bringToFront(text);
            canvas.setActiveObject(text);
        }

        // --- 功能：刪除選取 ---
        function deleteSelected() {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                canvas.remove(activeObject);
                canvas.discardActiveObject();
            }
        }

        // --- 功能：上傳至 GAS ---
        async function uploadDesign() {
            const submitBtn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMsg');

            // 確保畫布不是空的 (大於 1 個物件代表除了底框外有加東西)
            if (canvas.getObjects().length <= 1) {
                alert("請先載入照片或新增文字喔！");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "設計處理中...";
            statusMsg.innerText = "正在封裝高畫質檔案...";
            statusMsg.className = "mt-4 text-center text-xs font-light tracking-wide text-blue-500";

            // 取消選取框
            canvas.discardActiveObject();
            canvas.requestRenderAll();

            // 取得圖片 (multiplier: 4 確保超高畫質，300x456 變 1200x1824)
            const base64Image = canvas.toDataURL({ format: 'png', multiplier: 4 });

            const payload = {
                userName: document.getElementById('userName').value.trim(),
                orderID: document.getElementById('orderID').value.trim() || "無",
                imageB64: base64Image
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify(payload),
                    mode: 'no-cors'
                });
                statusMsg.innerText = "✓ 上傳成功！請截圖此畫面回報給客服。";
                statusMsg.className = "mt-4 text-center text-xs tracking-wide text-green-600 font-medium";
                submitBtn.innerText = "設計已成功送出";
            } catch (error) {
                statusMsg.innerText = "連線失敗，請檢查網路。";
                statusMsg.className = "mt-4 text-center text-xs tracking-wide text-red-500";
                submitBtn.innerText = "確認並上傳印製";
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
