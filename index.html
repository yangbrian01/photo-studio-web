<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO PHOTO STUDIO | 線上設計工作室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Roboto:wght@300;400;500&display=swap');
        body { 
            font-family: 'Roboto', 'Noto Sans TC', sans-serif; 
            /* 讓整個網頁固定，防止手機端上下滑動，更像 App */
            overflow: hidden; 
            background-color: #f3f4f6;
        }
        /* 畫布外框的陰影，製造出實體照片放在桌上的立體感 */
        .canvas-wrapper {
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), 0 1px 3px rgba(0,0,0,0.05);
            background-color: white;
            transition: all 0.3s ease;
        }
        /* 工具列按鈕點擊效果 */
        .tool-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="bg-white px-5 py-4 flex justify-between items-center shadow-sm z-10 shrink-0">
        <div class="flex flex-col">
            <h1 class="text-lg font-medium tracking-widest text-gray-900">PRO STUDIO</h1>
            <span class="text-[10px] text-gray-400 tracking-[0.2em] uppercase">Design Editor</span>
        </div>
        <button onclick="exportDesign()" class="bg-black text-white px-5 py-2 rounded-full text-sm font-light tracking-wider hover:bg-gray-800 transition shadow-md">
            下一步 <i class="fa-solid fa-arrow-right ml-1 text-xs"></i>
        </button>
    </header>

    <main class="flex-1 relative flex justify-center items-center bg-[#e5e7eb] overflow-hidden p-4">
        <div class="canvas-wrapper relative" id="workspace">
            <canvas id="editorCanvas"></canvas>
        </div>

        <div id="objectControls" class="absolute top-4 right-4 bg-white/90 backdrop-blur rounded-xl shadow-lg p-2 hidden flex-col gap-2 z-20">
            <button onclick="deleteSelected()" class="w-10 h-10 rounded-lg text-red-500 hover:bg-red-50 flex items-center justify-center transition" title="刪除">
                <i class="fa-regular fa-trash-can"></i>
            </button>
            <button onclick="bringToFront()" class="w-10 h-10 rounded-lg text-gray-700 hover:bg-gray-100 flex items-center justify-center transition" title="移至最上層">
                <i class="fa-solid fa-layer-group"></i>
            </button>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 px-2 py-4 pb-8 shrink-0 z-10">
        <div class="max-w-md mx-auto flex justify-around items-end">
            
            <label class="tool-btn flex flex-col items-center gap-2 cursor-pointer text-gray-600 hover:text-black transition">
                <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center text-xl">
                    <i class="fa-regular fa-image"></i>
                </div>
                <span class="text-xs font-light tracking-wide">照片</span>
                <input type="file" id="imageUploader" accept="image/*" class="hidden">
            </label>

            <button onclick="addText()" class="tool-btn flex flex-col items-center gap-2 text-gray-600 hover:text-black transition">
                <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center text-xl">
                    <i class="fa-solid fa-t"></i>
                </div>
                <span class="text-xs font-light tracking-wide">文字</span>
            </button>

            <button onclick="alert('相框功能即將推出！')" class="tool-btn flex flex-col items-center gap-2 text-gray-600 hover:text-black transition">
                <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center text-xl">
                    <i class="fa-regular fa-object-group"></i>
                </div>
                <span class="text-xs font-light tracking-wide">相框</span>
            </button>

            <button onclick="alert('貼紙庫即將推出！')" class="tool-btn flex flex-col items-center gap-2 text-gray-600 hover:text-black transition">
                <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center text-xl">
                    <i class="fa-regular fa-face-smile"></i>
                </div>
                <span class="text-xs font-light tracking-wide">貼紙</span>
            </button>

        </div>
    </footer>

    <a id="downloadLink" class="hidden"></a>

    <script>
        // --- 初始化 Fabric.js 畫布 ---
        // 設定畫布尺寸為 2:3 比例 (例如寬 320px, 高 480px)
        const CANVAS_WIDTH = 320;
        const CANVAS_HEIGHT = 480;
        
        const canvas = new fabric.Canvas('editorCanvas', {
            width: CANVAS_WIDTH,
            height: CANVAS_HEIGHT,
            backgroundColor: '#ffffff', // 預設白底，就像一張相紙
            preserveObjectStacking: true // 點擊圖層時不會自動跑到最前面，方便管理
        });

        // 監聽畫布點擊事件，控制右上角工具列顯示/隱藏
        const objectControls = document.getElementById('objectControls');
        canvas.on('selection:created', () => objectControls.classList.remove('hidden'));
        canvas.on('selection:updated', () => objectControls.classList.remove('hidden'));
        canvas.on('selection:cleared', () => objectControls.classList.add('hidden'));

        // --- 功能：上傳並加入照片 ---
        document.getElementById('imageUploader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(f) {
                const data = f.target.result;
                fabric.Image.fromURL(data, function(img) {
                    // 自動縮放照片，使其適應畫布寬度 (留一點邊界)
                    const scale = (CANVAS_WIDTH * 0.9) / img.width;
                    img.set({
                        scaleX: scale,
                        scaleY: scale,
                        cornerStyle: 'circle',
                        cornerColor: 'black',
                        borderColor: 'black',
                        transparentCorners: false
                    });
                    // 將照片放在畫布正中央
                    canvas.centerObject(img);
                    canvas.add(img);
                    canvas.setActiveObject(img); // 自動選中該照片
                });
            };
            reader.readAsDataURL(file);
            // 清空 input，允許重複上傳同一張圖
            e.target.value = '';
        });

        // --- 功能：新增文字 ---
        function addText() {
            const text = new fabric.IText('點擊修改文字', {
                left: CANVAS_WIDTH / 2,
                top: CANVAS_HEIGHT / 2,
                fontFamily: 'Noto Sans TC',
                fontSize: 24,
                fill: '#000000',
                originX: 'center',
                originY: 'center',
                cornerStyle: 'circle',
                cornerColor: 'black',
                borderColor: 'black',
                transparentCorners: false
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        // --- 功能：刪除選中的物件 ---
        function deleteSelected() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(function(object) {
                    canvas.remove(object);
                });
            }
        }

        // --- 功能：將圖層移至最上層 ---
        function bringToFront() {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                canvas.bringToFront(activeObject);
                canvas.requestRenderAll();
            }
        }

        // --- 功能：匯出設計 (目前先做下載到電腦/手機測試) ---
        function exportDesign() {
            // 匯出時取消選中狀態，才不會印出控制框
            canvas.discardActiveObject();
            canvas.requestRenderAll();

            // 取得高畫質的 Base64 圖片 (multiplier 放大解析度，確保列印清晰)
            const dataURL = canvas.toDataURL({
                format: 'png',
                multiplier: 3 // 將 320x480 放大 3 倍輸出 = 960x1440 高清大圖
            });

            // 觸發下載 (未來這裡會改成傳送 Base64 到你的 GAS 後台)
            const link = document.getElementById('downloadLink');
            link.download = 'my_design.png';
            link.href = dataURL;
            link.click();
        }
    </script>
</body>
</html>
