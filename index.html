<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO PHOTO STUDIO | 專屬相印</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@400;700&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&family=Caveat:wght@600&display=swap');
        
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #f8f9fa; overscroll-behavior: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .canvas-container { margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 4px; background-color: white; }
        
        /* 🎨 修復手機端顏色太擠的問題：放大圈圈並改為橫向滑動 */
        .color-scroll::-webkit-scrollbar { display: none; }
        .color-dot { flex: 0 0 32px; width: 32px; height: 32px; cursor: pointer; border-radius: 50%; border: 2px solid #e5e7eb; transition: transform 0.2s; }
        .color-dot.active { border: 2px solid #000; box-shadow: 0 0 8px rgba(0,0,0,0.3); transform: scale(1.1); }
        
        .filter-scroll::-webkit-scrollbar { display: none; } 
        .filter-item { flex: 0 0 75px; border-radius: 8px; border: 1px solid #e5e7eb; cursor: pointer; transition: all 0.2s; background-color: white; padding: 4px; }
        .filter-item.active { border-color: #000; background-color: #f8f9fa; }
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-900 antialiased relative py-8">

    <div style="visibility: hidden; position: absolute; top: -9999px;">
        <span style="font-family: 'Noto Serif TC';">預載</span><span style="font-family: 'Ma Shan Zheng';">預載</span><span style="font-family: 'Zhi Mang Xing';">預載</span><span style="font-family: 'ZCOOL QingKe HuangYou';">預載</span><span style="font-family: 'ZCOOL KuaiLe';">預載</span>
    </div>

    <div class="max-w-3xl mx-auto px-5">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-light tracking-[0.3em] uppercase mb-1 text-gray-800">Pro Studio</h1>
            <p class="text-gray-400 text-xs tracking-widest font-light">Xiaomi Pro 2x3" 客製化系統</p>
        </header>

        <div id="step1-container" class="bg-white rounded-2xl shadow-sm p-8 mb-6 border border-gray-100 transition-all">
            <h2 class="text-base font-medium mb-6 flex items-center tracking-wider text-gray-700">
                <span class="w-6 h-6 bg-black text-white rounded-full text-xs flex items-center justify-center mr-3">1</span>
                驗證訂單資訊
            </h2>
            <div class="space-y-4 mb-5">
                <input type="text" id="userName" placeholder="蝦皮帳號 / 姓名 (必填)" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-transparent focus:bg-white focus:border-gray-300 font-light text-sm">
                <input type="text" id="orderID" placeholder="請輸入蝦皮訂單編號" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-transparent focus:bg-white focus:border-gray-300 font-light text-sm">
            </div>
            <button id="verifyBtn" onclick="verifyOrder()" class="w-full bg-black text-white py-3.5 rounded-xl font-light tracking-widest hover:bg-gray-800 transition text-sm shadow-md">
                驗證訂單並開始設計
            </button>
            <p id="verifyMsg" class="mt-3 text-center text-xs tracking-wide text-red-500 hidden"></p>
        </div>

        <div id="step2-container" class="bg-white rounded-2xl shadow-sm border border-gray-100 hidden fade-in overflow-hidden relative">
            
            <div class="bg-gray-900 text-white px-5 py-3 flex justify-between items-center text-sm font-light tracking-wider">
                <span><i class="fa-solid fa-camera mr-2"></i>設計進度</span>
                <span id="progressText" class="font-medium text-blue-400">第 1 / ? 張</span>
            </div>

            <div class="bg-gray-100/50 py-8 relative flex justify-center border-b border-gray-50">
                <button onclick="toggleLayout()" class="absolute top-4 right-4 z-20 bg-white shadow-md border border-gray-100 px-3 py-1.5 rounded-full text-[10px] font-medium tracking-wide text-gray-600 transition flex items-center gap-1.5">
                    <i class="fa-solid fa-expand"></i> <span id="layoutText">目前: 拍立得白框</span>
                </button>
                <canvas id="editorCanvas"></canvas>
            </div>

            <div id="objectTools" class="px-5 py-4 bg-white hidden flex-col gap-4 transition border-b border-gray-50 relative z-10">
                <div class="flex justify-between items-center">
                    <div class="flex gap-1 border border-gray-100 p-1 rounded-lg bg-gray-50/50">
                        <button onclick="bringFront()" class="w-10 h-10 text-gray-500 hover:text-black rounded-md"><i class="fa-solid fa-layer-group"></i></button>
                        <button onclick="sendBack()" class="w-10 h-10 text-gray-500 hover:text-black rounded-md"><i class="fa-solid fa-layer-group fa-flip-vertical"></i></button>
                    </div>
                    <button onclick="deleteObj()" class="w-10 h-10 bg-red-50 text-red-400 hover:text-red-600 rounded-xl"><i class="fa-regular fa-trash-can"></i></button>
                </div>

                <div id="textTools" class="hidden flex-col gap-3">
                    <select id="fontFamily" class="w-full text-sm px-3 py-2 border border-gray-200 rounded-lg focus:border-black font-light tracking-wide bg-gray-50">
                        <option value="Noto Sans TC">經典黑體</option><option value="Noto Serif TC">高級宋體</option><option value="Ma Shan Zheng">毛筆行書</option><option value="Zhi Mang Xing">藝術狂草</option><option value="ZCOOL QingKe HuangYou">麥克筆體</option><option value="ZCOOL KuaiLe">可愛圓體</option><option value="Caveat">英文手寫</option>
                    </select>
                    <div class="flex overflow-x-auto gap-3 py-2 color-scroll snap-x" id="colorPalette"></div>
                </div>
            </div>

            <div class="px-5 py-5 bg-white space-y-5">
                
                <div class="p-4 border border-gray-100 rounded-xl bg-gray-50/50">
                    <label class="text-[11px] text-gray-400 font-medium mb-3 block text-center tracking-widest">風格濾鏡 (照片專屬)</label>
                    <div class="flex overflow-x-auto gap-3.5 filter-scroll pb-2 snap-x">
                        <button onclick="applyFilter('Original', this)" class="filter-item active text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5"><span class="text-[10px] font-light">原圖</span></button>
                        <button onclick="applyFilter('KPop', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5 hue-rotate-15 contrast-125 saturate-150"><span class="text-[10px] font-medium text-pink-500">女團粉</span></button>
                        <button onclick="applyFilter('BoyBand', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5 contrast-125 saturate-50 hue-rotate-180"><span class="text-[10px] font-medium text-blue-700">冷冽男團</span></button>
                        <button onclick="applyFilter('Cool', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5 contrast-125 hue-rotate-180 brightness-110"><span class="text-[10px] font-light">冷白皮</span></button>
                        <button onclick="applyFilter('Film', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5 sepia-[.3] contrast-125"><span class="text-[10px] font-light">底片感</span></button>
                        <button onclick="applyFilter('Vintage', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5" style="filter: sepia(1);"><span class="text-[10px] font-light">即可拍</span></button>
                        <button onclick="applyFilter('Mono', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5" style="filter: grayscale(1);"><span class="text-[10px] font-light">黑白</span></button>
                    </div>
                </div>

                <div class="flex justify-around items-center pt-2 border-t border-gray-100">
                    <label class="flex flex-col items-center gap-1.5 cursor-pointer text-gray-600 hover:text-black">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg shadow-sm"><i class="fa-regular fa-image"></i></div><span class="text-[11px] font-light">加照片</span>
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                    </label>
                    <button onclick="addText()" class="flex flex-col items-center gap-1.5 text-gray-600 hover:text-black">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg shadow-sm"><i class="fa-solid fa-t"></i></div><span class="text-[11px] font-light">加文字</span>
                    </button>
                    <button onclick="openLibrary()" class="flex flex-col items-center gap-1.5 text-gray-600 hover:text-black">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg shadow-sm"><i class="fa-regular fa-face-smile"></i></div><span class="text-[11px] font-light">貼紙庫</span>
                    </button>
                    <button onclick="clearCanvas()" class="flex flex-col items-center gap-1.5 text-red-400 hover:text-red-500">
                        <div class="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center text-lg shadow-sm"><i class="fa-solid fa-rotate-left"></i></div><span class="text-[11px] font-light">重置</span>
                    </button>
                </div>
            </div>
            
            <div class="px-5 py-4 bg-gray-50 border-t border-gray-200">
                <button id="saveNextBtn" onclick="saveAndNext()" class="w-full bg-black text-white py-3.5 rounded-xl font-light tracking-widest hover:bg-gray-800 transition text-sm shadow-md">
                    存檔並設計下一張
                </button>
            </div>
        </div>

        <p id="statusMsg" class="mt-4 text-center text-sm font-light tracking-wide text-blue-500"></p>
    </div>

    <div id="libraryModal" class="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-end justify-center hidden backdrop-blur-sm">
        <div class="bg-white w-full max-w-md h-[40vh] rounded-t-3xl shadow-2xl flex flex-col slide-up">
            <div class="p-4 flex justify-between items-center border-b border-gray-100">
                <h3 class="font-medium tracking-wide ml-4">可愛貼紙庫</h3>
                <button onclick="document.getElementById('libraryModal').classList.add('hidden')" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 grid grid-cols-4 gap-4 content-start bg-gray-50">
                <img onclick="addSticker('https://i.imgur.com/B9O6zF6.png')" src="https://i.imgur.com/B9O6zF6.png" class="w-full bg-white border border-gray-200 rounded-xl p-3 cursor-pointer shadow-sm">
                <img onclick="addSticker('https://i.imgur.com/L1MhM2P.png')" src="https://i.imgur.com/L1MhM2P.png" class="w-full bg-white border border-gray-200 rounded-xl p-3 cursor-pointer shadow-sm">
                <img onclick="addSticker('https://i.imgur.com/R3O2b9S.png')" src="https://i.imgur.com/R3O2b9S.png" class="w-full bg-white border border-gray-200 rounded-xl p-3 cursor-pointer shadow-sm">
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaCLSapAY7-odkPz8f8Vct843Ub001UGVmj92dckJtOkCieCa7iDWvysf5BwXmM_Bo/exec";
        let canvas, userImageObject, overlayFrameGroup;
        const C_W = 300, C_H = 456, P_LEFT = 18, P_TOP = 18, P_WIDTH = 264, P_HEIGHT = 338; 
        
        let isPolaroidLayout = true; 
        let expectedPhotos = 1; // 從試算表抓取的總張數
        let photoCart = []; // 購物車陣列

        const PREMIUM_COLORS = ['#000000', '#595959', '#a6a6a6', '#d9d9d9', '#6d4c41', '#a1887f', '#d7ccc8', '#faf0e6', '#ef5350', '#f48fb1', '#fce4ec', '#1976d2', '#64b5f6', '#bbdefb'];

        // --- 1. 訂單驗證 (向 GAS 發出查詢) ---
        async function verifyOrder() {
            const userName = document.getElementById('userName').value.trim();
            const orderID = document.getElementById('orderID').value.trim();
            const msg = document.getElementById('verifyMsg');
            const btn = document.getElementById('verifyBtn');

            if (!userName || !orderID) {
                msg.innerText = "請輸入姓名與訂單編號"; msg.classList.remove('hidden'); return;
            }

            msg.classList.add('hidden');
            btn.innerText = "驗證中..."; btn.disabled = true;

            try {
                // 使用 GET 方法查詢試算表
                const response = await fetch(`${SCRIPT_URL}?orderID=${orderID}`);
                const data = await response.json();

                if (data.status === 'success') {
                    expectedPhotos = parseInt(data.count);
                    unlockStep2();
                } else {
                    msg.innerText = data.message || "找不到此訂單，請確認是否填錯";
                    msg.classList.remove('hidden');
                    btn.innerText = "驗證訂單並開始設計"; btn.disabled = false;
                }
            } catch (error) {
                msg.innerText = "網路連線失敗，請稍後再試";
                msg.classList.remove('hidden');
                btn.innerText = "驗證訂單並開始設計"; btn.disabled = false;
            }
        }

        function unlockStep2() {
            document.getElementById('step1-container').classList.add('hidden');
            document.getElementById('step2-container').classList.remove('hidden');
            updateProgressUI();
            setTimeout(() => { if (!canvas) initCanvas(); }, 50);
        }

        function updateProgressUI() {
            const current = photoCart.length + 1;
            document.getElementById('progressText').innerText = `第 ${current} / ${expectedPhotos} 張`;
            
            const saveBtn = document.getElementById('saveNextBtn');
            if (current === expectedPhotos) {
                saveBtn.innerText = "確認並上傳所有設計";
                saveBtn.classList.replace('bg-black', 'bg-blue-600');
            } else {
                saveBtn.innerText = `存檔並設計下一張 (第 ${current+1} 張)`;
                saveBtn.classList.replace('bg-blue-600', 'bg-black');
            }
        }

        // --- 2. 畫布系統 (完美無 Bug 遮罩法) ---
        function initCanvas() {
            canvas = new fabric.Canvas('editorCanvas', { width: C_W, height: C_H, backgroundColor: '#ffffff', preserveObjectStacking: true });
            
            // 色盤 UI (放大版，可滑動)
            const palette = document.getElementById('colorPalette');
            PREMIUM_COLORS.forEach((color, i) => {
                const dot = document.createElement('div'); dot.className = `color-dot snap-center ${i === 0 ? 'active' : ''}`; dot.style.backgroundColor = color;
                dot.onclick = () => { document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); dot.classList.add('active'); setTextColor(color); };
                palette.appendChild(dot);
            });

            fabric.Object.prototype.set({ transparentCorners: false, cornerColor: '#fff', borderColor: '#000', cornerStrokeColor: '#000', cornerSize: 12 });
            
            // 🎨 終極解法：實體 Overlay Frame (不使用 clipPath，100% 防濾鏡 Bug)
            overlayFrameGroup = new fabric.Group([
                new fabric.Rect({ left: 0, top: 0, width: C_W, height: P_TOP, fill: '#f8f9fa' }), // 上邊
                new fabric.Rect({ left: 0, top: P_TOP + P_HEIGHT, width: C_W, height: C_H - (P_TOP + P_HEIGHT), fill: '#f8f9fa' }), // 下邊厚框
                new fabric.Rect({ left: 0, top: P_TOP, width: P_LEFT, height: P_HEIGHT, fill: '#f8f9fa' }), // 左邊
                new fabric.Rect({ left: P_LEFT + P_WIDTH, top: P_TOP, width: P_LEFT, height: P_HEIGHT, fill: '#f8f9fa' }) // 右邊
            ], { left: 0, top: 0, selectable: false, evented: false, id: 'overlayFrame' });
            
            canvas.add(overlayFrameGroup);

            canvas.on('selection:created', onSelection); canvas.on('selection:updated', onSelection);
            canvas.on('selection:cleared', () => document.getElementById('objectTools').classList.add('hidden'));
        }

        function onSelection() {
            document.getElementById('objectTools').classList.remove('hidden');
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                document.getElementById('textTools').classList.remove('hidden');
                document.getElementById('textTools').classList.add('flex');
                document.getElementById('fontFamily').value = activeObj.fontFamily;
            } else { 
                document.getElementById('textTools').classList.add('hidden'); 
                document.getElementById('textTools').classList.remove('flex');
            }
        }

        function toggleLayout() {
            isPolaroidLayout = !isPolaroidLayout; 
            document.getElementById('layoutText').innerText = isPolaroidLayout ? "目前: 拍立得白框" : "目前: 全螢幕滿版";
            // 透過調整遮罩外框的透明度來達成滿版效果，超順暢！
            overlayFrameGroup.set('opacity', isPolaroidLayout ? 1 : 0);
            canvas.requestRenderAll();
        }

        // 照片匯入
        document.getElementById('imageInput').onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    if (userImageObject) canvas.remove(userImageObject); 
                    userImageObject = img;
                    const scale = Math.max(P_WIDTH / img.width, P_HEIGHT / img.height);
                    img.set({ scaleX: scale, scaleY: scale, originX: 'center', originY: 'center', left: C_W / 2, top: P_TOP + (P_HEIGHT / 2), frameId: 'userImage' });
                    
                    canvas.add(img); 
                    // 確保順序：照片在最底，遮罩外框在照片上方
                    canvas.sendToBack(img);
                    canvas.bringToFront(overlayFrameGroup);
                    canvas.setActiveObject(img);
                });
            }; reader.readAsDataURL(file); e.target.value = '';
        };

        function addText() { 
            const text = new fabric.IText('輸入文字...', { left: C_W / 2, top: C_H - 50, fontFamily: 'Noto Sans TC', fontSize: 24, fill: '#000000', originX: 'center', originY: 'center' }); 
            canvas.add(text); canvas.bringToFront(text); canvas.setActiveObject(text); 
        }
        function setTextColor(hex) { const obj = canvas.getActiveObject(); if (obj && obj.type === 'i-text') { obj.set('fill', hex); canvas.requestRenderAll(); } }
        document.getElementById('fontFamily').addEventListener('change', async function(e) { const obj = canvas.getActiveObject(); if (obj && obj.type === 'i-text') { await document.fonts.load(`16px "${e.target.value}"`); obj.set('fontFamily', e.target.value); canvas.requestRenderAll(); } });

        function openLibrary() { document.getElementById('libraryModal').classList.remove('hidden'); }
        function addSticker(url) { document.getElementById('libraryModal').classList.add('hidden'); fabric.Image.fromURL(url, (img) => { img.set({ scaleX: 0.25, scaleY: 0.25, originX: 'center', originY: 'center', left: C_W / 2, top: C_H / 2 }); canvas.add(img); canvas.bringToFront(img); canvas.setActiveObject(img); }); }

        // 🎨 濾鏡：因為沒有 clipPath 扯後腿，現在 100% 穩定且精緻！
        function applyFilter(filterName, btn) {
            document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            if (!userImageObject) return;

            userImageObject.filters = [];
            switch (filterName) {
                case 'Original': break; 
                case 'KPop': userImageObject.filters.push(new fabric.Image.filters.Brightness({ brightness: 0.05 })); userImageObject.filters.push(new fabric.Image.filters.Contrast({ contrast: 0.1 })); userImageObject.filters.push(new fabric.Image.filters.BlendColor({ color: '#ffe4e1', mode: 'tint', alpha: 0.25 })); break;
                case 'BoyBand': userImageObject.filters.push(new fabric.Image.filters.Contrast({ contrast: 0.15 })); userImageObject.filters.push(new fabric.Image.filters.Saturation({ saturation: -0.15 })); userImageObject.filters.push(new fabric.Image.filters.BlendColor({ color: '#607d8b', mode: 'tint', alpha: 0.2 })); break;
                case 'Cool': userImageObject.filters.push(new fabric.Image.filters.Brightness({ brightness: 0.05 })); userImageObject.filters.push(new fabric.Image.filters.BlendColor({ color: '#e0f7fa', mode: 'tint', alpha: 0.2 })); break;
                case 'Film': userImageObject.filters.push(new fabric.Image.filters.Contrast({ contrast: 0.1 })); userImageObject.filters.push(new fabric.Image.filters.Saturation({ saturation: -0.1 })); userImageObject.filters.push(new fabric.Image.filters.BlendColor({ color: '#8b4513', mode: 'tint', alpha: 0.15 })); break;
                case 'Vintage': userImageObject.filters.push(new fabric.Image.filters.Sepia()); userImageObject.filters.push(new fabric.Image.filters.Brightness({ brightness: -0.1 })); break;
                case 'Mono': userImageObject.filters.push(new fabric.Image.filters.Grayscale()); break;
                case 'Fresh': userImageObject.filters.push(new fabric.Image.filters.Saturation({ saturation: 0.15 })); userImageObject.filters.push(new fabric.Image.filters.Brightness({ brightness: 0.05 })); break;
            }
            userImageObject.applyFilters(); canvas.requestRenderAll();
        }

        // 排列控制 (確保永遠在白框上方，但在文字下方)
        function bringFront() { const obj = canvas.getActiveObject(); if(obj) { canvas.bringToFront(obj); canvas.requestRenderAll(); } }
        function sendBack() { const obj = canvas.getActiveObject(); if(obj) { canvas.sendToBack(obj); if(userImageObject && obj !== userImageObject) canvas.bringForward(userImageObject); canvas.bringForward(overlayFrameGroup); canvas.requestRenderAll(); } }
        function deleteObj() { const obj = canvas.getActiveObject(); if(obj) { if(obj === userImageObject) userImageObject = null; canvas.remove(obj); canvas.discardActiveObject(); document.getElementById('objectTools').classList.add('hidden'); } }
        function clearCanvas() { if(confirm("確定重置當前畫布？")) { 
            const textObjects = canvas.getObjects().filter(o => o.type === 'i-text' || (o.type === 'image' && o.id !== 'overlayFrame'));
            textObjects.forEach(o => canvas.remove(o));
            userImageObject = null;
            document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active')); document.querySelector('.filter-item').classList.add('active');
        } }

        // --- 3. 購物車存檔與上傳 ---
        async function saveAndNext() {
            if (canvas.getObjects().length <= 2) { alert("請先加入照片或設計文字！"); return; }
            
            canvas.discardActiveObject(); canvas.requestRenderAll();
            // 存入陣列 (高清 3 倍輸出)
            photoCart.push(canvas.toDataURL({ format: 'png', multiplier: 3 }));
            
            if (photoCart.length === expectedPhotos) {
                // 張數到齊，執行上傳
                const btn = document.getElementById('saveNextBtn'); const msg = document.getElementById('statusMsg');
                btn.disabled = true; btn.innerText = "打包上傳中..."; msg.innerText = "正在傳送至工作室...";

                try {
                    await fetch(SCRIPT_URL, { 
                        method: "POST", 
                        body: JSON.stringify({ 
                            userName: document.getElementById('userName').value.trim(), 
                            orderID: document.getElementById('orderID').value.trim(), 
                            images: photoCart // 傳送陣列給 GAS
                        }), 
                        mode: 'no-cors' 
                    });
                    document.getElementById('step2-container').classList.add('hidden');
                    msg.innerText = "🎉 訂單送出成功！請截圖告知客服。";
                    msg.className = "mt-10 text-center text-xl font-medium tracking-wide text-green-500";
                } catch (error) { 
                    msg.innerText = "上傳失敗，請檢查網路。"; 
                    btn.disabled = false; btn.innerText = "重新送出"; 
                }
            } else {
                // 張數未到，清空畫布繼續
                clearCanvas();
                updateProgressUI();
                alert(`第 ${photoCart.length} 張已暫存！請繼續設計下一張。`);
            }
        }
    </script>
</body>
</html>
