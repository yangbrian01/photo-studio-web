<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO PHOTO STUDIO | 專業小卡客製</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-load-image/5.16.0/load-image.all.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Dancing+Script:wght@600&family=Ma+Shan+Zheng&family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@400;700&family=Pacifico&family=Permanent+Marker&family=Playfair+Display:ital,wght@0,600;1,600&family=Press+Start+2P&family=Righteous&family=Special+Elite&family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&family=Zhi+Mang+Xing&display=swap');
        
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #f8f9fa; overscroll-behavior: none; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .canvas-container { margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 4px; background-color: white; }
        .color-dot { flex: 0 0 32px; width: 32px; height: 32px; cursor: pointer; border-radius: 50%; border: 2px solid #e5e7eb; transition: transform 0.2s; }
        .color-dot.active { border: 2px solid #000; box-shadow: 0 0 8px rgba(0,0,0,0.3); transform: scale(1.1); }
        .filter-scroll::-webkit-scrollbar, .color-scroll::-webkit-scrollbar { display: none; } 
        .filter-item { flex: 0 0 75px; border-radius: 8px; border: 1px solid #e5e7eb; cursor: pointer; transition: all 0.2s; background-color: white; padding: 4px; }
        .filter-item.active { border-color: #000; background-color: #f8f9fa; }
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .layout-btn { flex: 0 0 auto; }
        .preset-btn { flex: 0 0 auto; padding: 8px 16px; border-radius: 8px; font-size: 12px; display: flex; align-items: center; gap: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: all 0.2s; border: 1px solid #e5e7eb; background: white; }
        .preset-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="text-gray-900 antialiased relative py-8">

    <div id="loadingOverlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center fade-in">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-black mb-4"></i>
        <p id="loadingText" class="text-sm font-medium tracking-widest text-gray-700">處理中...</p>
    </div>

    <div style="visibility: hidden; position: absolute; top: -9999px;">
        <span style="font-family: 'Noto Serif TC';">預載</span><span style="font-family: 'Ma Shan Zheng';">預載</span>
        <span style="font-family: 'Zhi Mang Xing';">預載</span><span style="font-family: 'ZCOOL QingKe HuangYou';">預載</span>
        <span style="font-family: 'ZCOOL KuaiLe';">預載</span><span style="font-family: 'Special Elite';">預載</span>
        <span style="font-family: 'Permanent Marker';">預載</span><span style="font-family: 'Playfair Display';">預載</span>
        <span style="font-family: 'Dancing Script';">預載</span><span style="font-family: 'Pacifico';">預載</span>
        <span style="font-family: 'Press Start 2P';">預載</span><span style="font-family: 'Righteous';">預載</span>
    </div>

    <div class="max-w-3xl mx-auto px-5">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-light tracking-[0.3em] uppercase mb-2 text-gray-800">Pro Studio</h1>
            <p class="text-gray-400 text-xs tracking-widest font-light">專業 小卡/拍立得 客製化系統</p>
        </header>

        <div id="step1-container" class="bg-white rounded-2xl shadow-sm p-8 mb-6 border border-gray-100 transition-all">
            <h2 class="text-lg font-medium mb-6 flex items-center tracking-wide">
                <span class="w-6 h-6 bg-black text-white rounded-full text-xs flex items-center justify-center mr-3 font-normal">1</span>
                填寫訂單資訊
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <input type="text" id="userName" placeholder="蝦皮帳號 / 姓名 (必填)" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-black transition font-light text-sm">
                    <p id="nameError" class="text-red-500 text-xs mt-1 hidden tracking-wide">請填寫您的稱呼或帳號</p>
                </div>
                <input type="text" id="orderID" placeholder="蝦皮訂單編號" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-black transition font-light text-sm">
            </div>
            <button onclick="verifyAndNext()" class="w-full bg-gray-900 text-white py-3.5 rounded-xl font-light tracking-widest hover:bg-black transition duration-300 text-sm mt-2 shadow-md">
                驗證訂單並開始設計
            </button>
        </div>

        <div id="step2-container" class="bg-white rounded-2xl shadow-sm border border-gray-100 hidden fade-in overflow-hidden relative">
            <div class="bg-gray-900 text-white px-5 py-3 flex justify-between items-center text-sm font-light tracking-wider">
                <span><i class="fa-solid fa-camera mr-2"></i>設計進度</span>
                <span id="progressText" class="font-medium text-blue-400">第 1 / ? 張</span>
            </div>

            <div class="bg-white border-b border-gray-100 p-3 flex justify-start md:justify-center gap-2 overflow-x-auto filter-scroll">
                <button onclick="switchLayout('polaroid')" id="btn-polaroid" class="layout-btn px-4 py-1.5 rounded-full text-xs font-medium border border-black bg-black text-white transition">拍立得</button>
                <button onclick="switchLayout('full')" id="btn-full" class="layout-btn px-4 py-1.5 rounded-full text-xs font-medium border border-gray-200 text-gray-500 transition">全滿版</button>
                <button onclick="switchLayout('fourCutSingle')" id="btn-fourCutSingle" class="layout-btn px-4 py-1.5 rounded-full text-xs font-medium border border-gray-200 text-gray-500 transition">四格 (單圖)</button>
                <button onclick="switchLayout('fourCutMulti')" id="btn-fourCutMulti" class="layout-btn px-4 py-1.5 rounded-full text-xs font-medium border border-gray-200 text-gray-500 transition">四格 (多圖)</button>
            </div>

            <div class="bg-gray-100/50 py-8 relative flex flex-col items-center border-b border-gray-50">
                <div class="mb-4">
                    <span class="text-[10px] text-red-500 bg-red-50 px-3 py-1.5 rounded-full border border-red-100 shadow-sm flex items-center gap-1.5 tracking-widest font-light">
                        <i class="fa-solid fa-triangle-exclamation"></i> 貼心提醒：請將重要文字與人臉放在紅色虛線內
                    </span>
                </div>
                <div class="relative">
                    <canvas id="editorCanvas"></canvas>
                </div>
            </div>

            <div id="objectTools" class="px-5 py-4 bg-white hidden flex-col gap-4 transition border-b border-gray-50 relative z-10">
                <div class="flex justify-between items-center">
                    <div class="flex gap-1 border border-gray-100 p-1 rounded-lg bg-gray-50/50">
                        <button onclick="bringFront()" class="w-10 h-10 text-gray-500 hover:text-black rounded-md"><i class="fa-solid fa-layer-group"></i></button>
                        <button onclick="sendBack()" class="w-10 h-10 text-gray-500 hover:text-black rounded-md"><i class="fa-solid fa-layer-group fa-flip-vertical"></i></button>
                    </div>
                    <button onclick="deleteObj()" class="w-10 h-10 bg-red-50 text-red-400 hover:text-red-600 rounded-xl"><i class="fa-regular fa-trash-can"></i></button>
                </div>
                <div id="textTools" class="hidden flex-col gap-3 border-t border-gray-100 pt-3">
                    <select id="fontFamily" class="w-full text-sm px-3 py-2 border border-gray-200 rounded-lg focus:border-black font-light bg-gray-50">
                        <optgroup label="經典中文">
                            <option value="Noto Sans TC">黑體 (清晰易讀)</option>
                            <option value="Noto Serif TC">宋體 (高級文青)</option>
                        </optgroup>
                        <optgroup label="造型中文字">
                            <option value="Ma Shan Zheng">毛筆行書 (瀟灑)</option>
                            <option value="Zhi Mang Xing">藝術狂草 (霸氣)</option>
                            <option value="ZCOOL QingKe HuangYou">麥克筆體 (應援必備)</option>
                            <option value="ZCOOL KuaiLe">可愛圓體 (Q版)</option>
                        </optgroup>
                        <optgroup label="高級英文字體 (僅限英文)">
                            <option value="Dancing Script">連筆簽名 (流暢)</option>
                            <option value="Caveat">英文手寫 (清新)</option>
                            <option value="Playfair Display">雜誌標題 (VOGUE風)</option>
                            <option value="Permanent Marker">美式塗鴉 (街頭)</option>
                            <option value="Righteous">幾何潮流 (科技)</option>
                            <option value="Special Elite">復古打字機 (電影)</option>
                            <option value="Press Start 2P">像素遊戲 (8-bit)</option>
                        </optgroup>
                    </select>
                    <div class="flex overflow-x-auto gap-3 py-2 color-scroll snap-x" id="colorPalette"></div>
                </div>
            </div>

            <div class="px-5 py-5 bg-white space-y-5">
                <div class="p-4 border border-gray-100 rounded-xl bg-gray-50/50">
                    <label class="text-[11px] text-gray-400 font-medium mb-3 block text-center tracking-widest">風格濾鏡 (請先點選照片)</label>
                    <div class="flex overflow-x-auto gap-3.5 filter-scroll pb-2 snap-x">
                        <button onclick="applyFilter('Original', this)" class="filter-item active text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5"><span class="text-[10px] font-light">原圖</span></button>
                        <button onclick="applyFilter('KPop', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5 hue-rotate-15 contrast-125 saturate-150"><span class="text-[10px] font-medium text-pink-500">女團粉</span></button>
                        <button onclick="applyFilter('BoyBand', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5 contrast-125 saturate-50 hue-rotate-180"><span class="text-[10px] font-medium text-blue-700">男團風</span></button>
                        <button onclick="applyFilter('Cool', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5 contrast-125 hue-rotate-180 brightness-110"><span class="text-[10px] font-light">冷白皮</span></button>
                        <button onclick="applyFilter('Film', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5 sepia-[.3] contrast-125"><span class="text-[10px] font-light">底片感</span></button>
                        <button onclick="applyFilter('Vintage', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5" style="filter: sepia(1);"><span class="text-[10px] font-light">即可拍</span></button>
                        <button onclick="applyFilter('Fresh', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5" style="filter: saturate(1.5);"><span class="text-[10px] font-light">清新</span></button>
                        <button onclick="applyFilter('Mono', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5" style="filter: grayscale(1);"><span class="text-[10px] font-light">黑白</span></button>
                    </div>
                </div>

                <div class="flex overflow-x-auto gap-3 py-1 filter-scroll snap-x">
                    <button onclick="addPresetText('normal')" class="preset-btn snap-center bg-gray-100"><i class="fa-solid fa-t"></i> 基本文字</button>
                    <button onclick="addPresetText('signature')" class="preset-btn snap-center text-blue-600 border-blue-200"><i class="fa-solid fa-signature"></i> 拍立得簽名</button>
                    <button onclick="addPresetText('subtitle')" class="preset-btn snap-center bg-yellow-50 text-yellow-700 border-yellow-200"><i class="fa-solid fa-closed-captioning"></i> 電影字幕</button>
                    <button onclick="addPresetText('neon')" class="preset-btn snap-center bg-gray-900 text-pink-400 border-black"><i class="fa-solid fa-bolt"></i> 霓虹發光</button>
                    <button onclick="addPresetText('magazine')" class="preset-btn snap-center text-gray-800 border-gray-400"><i class="fa-solid fa-book-open"></i> 雜誌標題</button>
                    <button onclick="addPresetText('typewriter')" class="preset-btn snap-center bg-black text-white"><i class="fa-solid fa-keyboard"></i> 復古打字機</button>
                    <button onclick="addPresetText('japanese')" class="preset-btn snap-center bg-[#f4eade] text-[#5c4033] border-[#d2b48c]"><i class="fa-solid fa-pen-nib"></i> 質感直排</button>
                </div>

                <div class="flex justify-around items-center pt-4 border-t border-gray-100">
                    <label class="flex flex-col items-center gap-1.5 cursor-pointer text-gray-600 hover:text-black transition">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg shadow-sm"><i class="fa-regular fa-image"></i></div><span class="text-[11px] font-light">加照片</span>
                        <input type="file" id="imageInput" multiple accept="image/*" class="hidden">
                    </label>
                    <button onclick="openModal('frameModal')" class="flex flex-col items-center gap-1.5 text-gray-600 hover:text-black transition">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg shadow-sm"><i class="fa-regular fa-object-group"></i></div><span class="text-[11px] font-light">加相框</span>
                    </button>
                    <button onclick="openModal('libraryModal')" class="flex flex-col items-center gap-1.5 text-gray-600 hover:text-black transition">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg shadow-sm"><i class="fa-regular fa-face-smile"></i></div><span class="text-[11px] font-light">加貼紙</span>
                    </button>
                    <button onclick="clearCanvas()" class="flex flex-col items-center gap-1.5 text-red-400 hover:text-red-500 transition">
                        <div class="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center text-lg shadow-sm"><i class="fa-solid fa-rotate-left"></i></div><span class="text-[11px] font-light">重置版面</span>
                    </button>
                </div>
            </div>
            
            <div class="px-5 py-4 bg-gray-50 border-t border-gray-200 flex gap-3">
                <button id="saveNextBtn" onclick="saveAndNext()" class="w-1/2 bg-black text-white py-3.5 rounded-xl font-light tracking-widest hover:bg-gray-800 transition text-sm shadow-md">
                    存單張
                </button>
                <button id="batchBtn" onclick="batchDuplicate()" class="w-1/2 bg-blue-600 text-white py-3.5 rounded-xl font-light tracking-widest hover:bg-blue-700 transition text-sm shadow-md flex justify-center items-center gap-2">
                    <i class="fa-solid fa-copy"></i> 自動洗滿
                </button>
            </div>
        </div>

        <div id="success-container" class="bg-white rounded-2xl shadow-lg border border-gray-100 hidden fade-in overflow-hidden relative pb-8">
            <div class="bg-green-500 text-white text-center py-10" id="successHeader">
                <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3"><i class="fa-solid fa-check text-3xl" id="successIcon"></i></div>
                <h2 class="text-2xl font-medium tracking-widest" id="successTitle">訂單已送達工作室</h2>
                <p class="text-green-100 text-sm mt-1 font-light tracking-wide" id="successSub">我們會盡快為您安排印製</p>
            </div>
            <div class="px-8 mt-6">
                <h3 class="text-sm font-medium text-gray-800 border-b border-gray-100 pb-2 mb-4 tracking-wider">訂單明細</h3>
                <div class="space-y-3 mb-8">
                    <div class="flex justify-between text-sm"><span class="text-gray-400 font-light">顧客姓名</span><span id="resName" class="font-medium text-gray-800"></span></div>
                    <div class="flex justify-between text-sm"><span class="text-gray-400 font-light">訂單編號</span><span id="resOrderID" class="font-medium text-gray-800"></span></div>
                    <div class="flex justify-between text-sm"><span class="text-gray-400 font-light">印製總數</span><span id="resCount" class="font-medium text-gray-800"></span></div>
                </div>
                <h3 class="text-sm font-medium text-gray-800 border-b border-gray-100 pb-2 mb-4 tracking-wider">您的設計展示</h3>
                <div id="galleryContainer" class="grid grid-cols-2 gap-4"></div>
            </div>
        </div>

        <p id="statusMsg" class="mt-4 text-center text-sm font-light tracking-wide text-blue-500"></p>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center hidden fade-in backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full mx-4 text-center">
            <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-4"><span class="text-xl">🛒</span></div>
            <h3 class="text-lg font-medium text-gray-900 mb-2 tracking-wide">尚未填寫訂單編號</h3>
            <p class="text-sm text-gray-500 font-light mb-6 leading-relaxed">建議您先至蝦皮賣場完成下單，以利工作室為您安排印製。</p>
            <div class="space-y-3">
                <button onclick="alert('前往蝦皮')" class="w-full bg-black text-white py-3 rounded-xl font-light tracking-widest text-sm">前往蝦皮下單</button>
                <button onclick="enterPreview()" class="w-full bg-white text-gray-500 border border-gray-200 py-3 rounded-xl font-light tracking-widest text-sm">我只想先預覽效果</button>
                <button onclick="closeModal('orderModal')" class="text-xs text-gray-400 mt-2 hover:text-gray-600 tracking-wide">返回修改資訊</button>
            </div>
        </div>
    </div>

    <div id="previewDoneModal" class="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-center justify-center hidden fade-in backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-sm w-full mx-4 text-center">
            <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-wand-magic-sparkles text-blue-500 text-xl"></i></div>
            <h3 class="text-lg font-medium text-gray-900 mb-2 tracking-wide">預覽設計完成</h3>
            <p class="text-sm text-gray-500 font-light mb-4 leading-relaxed">請輸入剛取得的蝦皮單號，將目前的設計正式保留並上傳！</p>
            <input type="text" id="previewOrderID" placeholder="輸入蝦皮訂單編號" class="w-full px-4 py-3 mb-5 rounded-xl bg-gray-50 border border-gray-200 focus:bg-white focus:border-black font-light text-sm transition">
            <div class="space-y-3">
                <button onclick="convertPreviewToReal()" class="w-full bg-black text-white py-3 rounded-xl font-light tracking-widest text-sm shadow-md">驗證並保留設計</button>
                <button onclick="location.reload()" class="w-full bg-white text-gray-500 border border-gray-200 py-3 rounded-xl font-light tracking-widest text-sm">不保留，回首頁</button>
            </div>
            <p id="previewVerifyMsg" class="mt-3 text-center text-xs text-red-500 hidden tracking-wide"></p>
        </div>
    </div>

    <div id="libraryModal" class="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-end justify-center hidden backdrop-blur-sm">
        <div class="bg-white w-full max-w-md h-[40vh] rounded-t-3xl shadow-2xl flex flex-col slide-up">
            <div class="p-4 flex justify-between items-center border-b border-gray-100">
                <h3 class="font-medium tracking-wide ml-4 text-gray-800">可愛貼紙庫</h3>
                <button onclick="closeModal('libraryModal')" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 grid grid-cols-4 gap-4 content-start bg-gray-50">
                <img onclick="addSticker('https://i.imgur.com/B9O6zF6.png')" src="https://i.imgur.com/B9O6zF6.png" class="w-full bg-white border border-gray-200 rounded-xl p-3 cursor-pointer shadow-sm">
                <img onclick="addSticker('https://i.imgur.com/L1MhM2P.png')" src="https://i.imgur.com/L1MhM2P.png" class="w-full bg-white border border-gray-200 rounded-xl p-3 cursor-pointer shadow-sm">
                <img onclick="addSticker('https://i.imgur.com/R3O2b9S.png')" src="https://i.imgur.com/R3O2b9S.png" class="w-full bg-white border border-gray-200 rounded-xl p-3 cursor-pointer shadow-sm">
            </div>
        </div>
    </div>

    <div id="frameModal" class="fixed inset-0 bg-black bg-opacity-40 z-50 flex items-end justify-center hidden backdrop-blur-sm">
        <div class="bg-white w-full max-w-md h-[40vh] rounded-t-3xl shadow-2xl flex flex-col slide-up">
            <div class="p-4 flex justify-between items-center border-b border-gray-100">
                <h3 class="font-medium tracking-wide ml-4 text-gray-800">質感相框底圖</h3>
                <button onclick="closeModal('frameModal')" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 grid grid-cols-3 gap-4 content-start bg-gray-50">
                <div onclick="addFrame('https://i.imgur.com/KzXG5Rj.png')" class="cursor-pointer flex flex-col items-center hover:-translate-y-1 transition"><img src="https://i.imgur.com/KzXG5Rj.png" class="w-full h-auto border border-gray-200 rounded-lg shadow-sm bg-white p-1"><span class="text-[10px] text-gray-500 mt-2 font-light">彩虹相框</span></div>
                <div onclick="addFrame('https://i.imgur.com/vH7T7bM.png')" class="cursor-pointer flex flex-col items-center hover:-translate-y-1 transition"><img src="https://i.imgur.com/vH7T7bM.png" class="w-full h-auto border border-gray-200 rounded-lg shadow-sm bg-white p-1"><span class="text-[10px] text-gray-500 mt-2 font-light">經典拍立得</span></div>
                <div onclick="removeFrame()" class="cursor-pointer flex flex-col items-center justify-center h-[120px] border-2 border-dashed border-gray-300 rounded-lg bg-gray-100 hover:bg-gray-200 transition"><i class="fa-solid fa-ban text-gray-400 mb-1"></i><span class="text-[10px] text-gray-500 font-light">移除相框</span></div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaCLSapAY7-odkPz8f8Vct843Ub001UGVmj92dckJtOkCieCa7iDWvysf5BwXmM_Bo/exec";
        let canvas, overlayFrameGroup, safeZoneRect;
        let guideLines = []; 
        const C_W = 300, C_H = 456, P_LEFT = 18, P_TOP = 18, P_WIDTH = 264, P_HEIGHT = 338; 
        
        let currentLayout = 'polaroid';
        let isPreviewMode = false;
        let expectedPhotos = 1; let photoCart = []; 

        const layouts = {
            'polaroid': [{ left: 18, top: 18, width: 264, height: 338 }],
            'full': [{ left: 0, top: 0, width: C_W, height: C_H }],
            'fourCutSingle': [{ left: 18, top: 30, width: 264, height: 350 }], 
            'fourCutMulti': [
                { left: 18, top: 30, width: 127, height: 170 }, { left: 155, top: 30, width: 127, height: 170 },
                { left: 18, top: 210, width: 127, height: 170 }, { left: 155, top: 210, width: 127, height: 170 }
            ]
        };

        const PREMIUM_COLORS = ['#000000', '#595959', '#ffffff', '#a6a6a6', '#d9d9d9', '#6d4c41', '#a1887f', '#d7ccc8', '#faf0e6', '#ef5350', '#f48fb1', '#1976d2', '#64b5f6', '#ffd700'];

        function showLoading(text) {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingOverlay').classList.remove('hidden');
            document.getElementById('loadingOverlay').classList.add('flex');
        }
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.getElementById('loadingOverlay').classList.remove('flex');
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        async function verifyAndNext() {
            const userName = document.getElementById('userName').value.trim();
            const orderID = document.getElementById('orderID').value.trim();
            if (!userName) { document.getElementById('nameError').classList.remove('hidden'); return; }
            document.getElementById('nameError').classList.add('hidden');
            if (!orderID) { openModal('orderModal'); return; }

            showLoading("連線至系統驗證中...");

            try {
                const response = await fetch(`${SCRIPT_URL}?orderID=${orderID}`); const data = await response.json();
                if (data.status === 'success') {
                    expectedPhotos = parseInt(data.count); isPreviewMode = false; unlockStep2();
                } else if (data.status === 'completed') {
                    document.getElementById('step1-container').classList.add('hidden');
                    document.getElementById('success-container').classList.remove('hidden');
                    document.getElementById('resName').innerText = userName; document.getElementById('resOrderID').innerText = orderID; document.getElementById('resCount').innerText = `${parseInt(data.count)} 張`;
                    const gallery = document.getElementById('galleryContainer'); gallery.innerHTML = '';
                    if(data.images && data.images.length > 0){
                        data.images.forEach((url, index) => {
                            let displayUrl = url; const match = url.match(/[-\w]{25,}/);
                            if (match) displayUrl = `https://drive.google.com/thumbnail?id=${match[0]}&sz=w800`;
                            gallery.innerHTML += `<div class="bg-gray-50 rounded-xl p-2 border border-gray-100 shadow-sm flex flex-col items-center justify-center min-h-[150px]"><img src="${displayUrl}" class="w-full h-auto rounded shadow-sm object-cover" onerror="this.onerror=null; this.src='https://placehold.co/300x456/f3f4f6/a1a1aa?text=Loading...';"><p class="text-center text-[10px] text-gray-400 mt-2 font-light">第 ${index+1} 張</p></div>`;
                        });
                    }
                } else { alert(data.message); }
            } catch (error) { alert("驗證失敗，請檢查網路連線。"); }
            hideLoading();
        }

        function enterPreview() { closeModal('orderModal'); isPreviewMode = true; expectedPhotos = 1; unlockStep2(); }

        function unlockStep2() {
            document.getElementById('step1-container').classList.add('hidden');
            document.getElementById('step2-container').classList.remove('hidden');
            updateProgressUI(); setTimeout(() => { if (!canvas) initCanvas(); }, 50);
        }

        // 🚀 BUG 修復：按鈕文字與邏輯精準化
        function updateProgressUI() {
            const current = photoCart.length + 1;
            document.getElementById('progressText').innerText = isPreviewMode ? "體驗模式" : `第 ${current} / ${expectedPhotos} 張`;
            const saveBtn = document.getElementById('saveNextBtn'); const batchBtn = document.getElementById('batchBtn');

            if (isPreviewMode) {
                saveBtn.innerText = "預覽完成，前往綁定單號"; saveBtn.classList.replace('bg-black', 'bg-blue-600'); saveBtn.classList.remove('w-1/2'); saveBtn.classList.add('w-full'); batchBtn.classList.add('hidden');
            } else if (current === expectedPhotos) {
                // 如果是最後一張
                saveBtn.innerText = `完成並上傳 (第 ${current} 張)`; saveBtn.classList.replace('bg-black', 'bg-blue-600'); saveBtn.classList.remove('w-1/2'); saveBtn.classList.add('w-full'); batchBtn.classList.add('hidden');
            } else if (current > expectedPhotos) {
                // 已經滿了
                saveBtn.innerText = "上傳中..."; saveBtn.classList.replace('bg-black', 'bg-blue-600'); saveBtn.classList.remove('w-1/2'); saveBtn.classList.add('w-full'); batchBtn.classList.add('hidden');
            } else {
                saveBtn.innerText = `存單張 (第 ${current} 張)`; saveBtn.classList.replace('bg-blue-600', 'bg-black'); saveBtn.classList.remove('w-full'); saveBtn.classList.add('w-1/2'); batchBtn.classList.remove('hidden'); 
                batchBtn.innerHTML = `<i class="fa-solid fa-copy"></i> 自動洗滿 (剩 ${expectedPhotos - current} 張)`;
            }
        }

        function initCanvas() {
            fabric.filterBackend = new fabric.Canvas2dFilterBackend();
            canvas = new fabric.Canvas('editorCanvas', { width: C_W, height: C_H, backgroundColor: '#ffffff', preserveObjectStacking: true });
            
            const palette = document.getElementById('colorPalette');
            PREMIUM_COLORS.forEach((color, i) => {
                const dot = document.createElement('div'); dot.className = `color-dot snap-center ${i === 0 ? 'active' : ''}`; dot.style.backgroundColor = color;
                dot.onclick = () => { document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); dot.classList.add('active'); setTextColor(color); };
                palette.appendChild(dot);
            });

            fabric.Object.prototype.set({ transparentCorners: false, cornerColor: '#fff', borderColor: '#000', cornerStrokeColor: '#000', cornerSize: 12 });
            
            safeZoneRect = new fabric.Rect({
                left: 12, top: 12, width: C_W - 24, height: C_H - 24,
                fill: 'transparent', stroke: 'rgba(239, 68, 68, 0.6)', strokeWidth: 1.5, strokeDashArray: [6, 6], selectable: false, evented: false, id: 'safeZone'
            });
            canvas.add(safeZoneRect);

            drawOverlay(); initSnapping(); 
            canvas.on('selection:created', onSelection); canvas.on('selection:updated', onSelection); canvas.on('selection:cleared', () => document.getElementById('objectTools').classList.add('hidden'));
        }

        function clearGuidelines() { guideLines.forEach(line => canvas.remove(line)); guideLines = []; }

        function initSnapping() {
            const snapZone = 12; const snapColor = '#ec4899';
            canvas.on('object:moving', function(e) {
                clearGuidelines();
                const obj = e.target; if (!obj || obj.id === 'overlayFrame' || obj.id === 'safeZone') return;

                const objCenter = obj.getCenterPoint();
                let snapX = null, snapY = null;
                let targetLinesX = [canvas.width / 2]; let targetLinesY = [canvas.height / 2];

                canvas.getObjects().filter(o => o.isUserImage).forEach(img => {
                    const imgCenter = img.getCenterPoint(); targetLinesX.push(imgCenter.x); targetLinesY.push(imgCenter.y);
                });

                for (let x of [...new Set(targetLinesX)]) {
                    if (Math.abs(objCenter.x - x) < snapZone) {
                        snapX = x;
                        let line = new fabric.Line([x, 0, x, canvas.height], { stroke: snapColor, strokeWidth: 1, strokeDashArray: [4, 4], selectable: false, evented: false, opacity: 0.8 });
                        guideLines.push(line); canvas.add(line); break; 
                    }
                }
                for (let y of [...new Set(targetLinesY)]) {
                    if (Math.abs(objCenter.y - y) < snapZone) {
                        snapY = y;
                        let line = new fabric.Line([0, y, canvas.width, y], { stroke: snapColor, strokeWidth: 1, strokeDashArray: [4, 4], selectable: false, evented: false, opacity: 0.8 });
                        guideLines.push(line); canvas.add(line); break;
                    }
                }

                if (snapX !== null || snapY !== null) {
                    obj.setPositionByOrigin(new fabric.Point(snapX !== null ? snapX : objCenter.x, snapY !== null ? snapY : objCenter.y), 'center', 'center');
                    obj.setCoords(); 
                }
                sortLayers(); 
            });

            canvas.on('mouse:up', clearGuidelines); canvas.on('object:modified', clearGuidelines);
        }

        function drawOverlay() {
            if (overlayFrameGroup) canvas.remove(overlayFrameGroup);
            let rects = [];
            
            if (currentLayout === 'polaroid') {
                rects.push(new fabric.Rect({ left: 0, top: 0, width: C_W, height: 18, fill: '#f8f9fa' })); 
                rects.push(new fabric.Rect({ left: 0, top: 356, width: C_W, height: 100, fill: '#f8f9fa' })); 
                rects.push(new fabric.Rect({ left: 0, top: 18, width: 18, height: 338, fill: '#f8f9fa' })); 
                rects.push(new fabric.Rect({ left: 282, top: 18, width: 18, height: 338, fill: '#f8f9fa' })); 
            } else if (currentLayout === 'fourCutSingle' || currentLayout === 'fourCutMulti') {
                rects.push(new fabric.Rect({ left: 0, top: 0, width: C_W, height: 30, fill: '#f8f9fa' })); 
                rects.push(new fabric.Rect({ left: 0, top: 380, width: C_W, height: 76, fill: '#f8f9fa' })); 
                rects.push(new fabric.Rect({ left: 0, top: 30, width: 18, height: 350, fill: '#f8f9fa' })); 
                rects.push(new fabric.Rect({ left: 282, top: 30, width: 18, height: 350, fill: '#f8f9fa' })); 
                rects.push(new fabric.Rect({ left: 145, top: 30, width: 10, height: 350, fill: '#f8f9fa' })); 
                rects.push(new fabric.Rect({ left: 18, top: 200, width: 264, height: 10, fill: '#f8f9fa' })); 
            }

            if (rects.length > 0) {
                overlayFrameGroup = new fabric.Group(rects, { left: 0, top: 0, selectable: false, evented: false, id: 'overlayFrame' });
                canvas.add(overlayFrameGroup);
            } else { overlayFrameGroup = null; }
            
            canvas.getObjects().filter(o => o.isUserImage).forEach(img => {
                if (currentLayout !== 'full') {
                    const slot = layouts[currentLayout][img.slotIndex] || layouts[currentLayout][0]; 
                    img.set('clipPath', new fabric.Rect({ left: slot.left, top: slot.top, width: slot.width, height: slot.height, absolutePositioned: true }));
                } else { img.set('clipPath', null); }
            });
            sortLayers(); 
        }

        function switchLayout(mode) {
            currentLayout = mode;
            ['polaroid', 'full', 'fourCutSingle', 'fourCutMulti'].forEach(m => document.getElementById(`btn-${m}`).className = "layout-btn px-4 py-1.5 rounded-full text-xs font-medium border border-gray-200 text-gray-500 transition");
            document.getElementById(`btn-${mode}`).className = "layout-btn px-4 py-1.5 rounded-full text-xs font-medium border border-black bg-black text-white transition";
            drawOverlay();
        }

        function sortLayers() {
            canvas.getObjects().filter(o => o.isFrame).forEach(o => canvas.sendToBack(o));
            if (overlayFrameGroup) canvas.bringToFront(overlayFrameGroup);
            canvas.getObjects().filter(o => o.isSticker).forEach(o => canvas.bringToFront(o));
            canvas.getObjects().filter(o => o.type === 'i-text').forEach(o => canvas.bringToFront(o));
            if (safeZoneRect) canvas.bringToFront(safeZoneRect);
            guideLines.forEach(l => canvas.bringToFront(l)); 
        }

        function onSelection() {
            document.getElementById('objectTools').classList.remove('hidden');
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                document.getElementById('textTools').classList.remove('hidden'); document.getElementById('textTools').classList.add('flex');
                document.getElementById('fontFamily').value = activeObj.fontFamily;
            } else { document.getElementById('textTools').classList.add('hidden'); document.getElementById('textTools').classList.remove('flex'); }
        }

        document.getElementById('imageInput').onchange = (e) => {
            const files = Array.from(e.target.files); if (!files.length) return;
            const slots = layouts[currentLayout];
            
            showLoading("高畫質相片載入中...");

            let fileIndex = 0;
            function processNext() {
                if (fileIndex >= files.length) { hideLoading(); return; }
                
                const usedSlots = canvas.getObjects().filter(o => o.isUserImage).map(o => o.slotIndex);
                let freeSlot = -1;
                for(let i=0; i<slots.length; i++) { if(!usedSlots.includes(i)) { freeSlot = i; break; } }
                
                if (freeSlot === -1) { alert("此版型的照片格已滿！請先刪除不要的照片。"); hideLoading(); return; }

                loadImage(files[fileIndex], function (imgCanvas) {
                    if(imgCanvas.type === "error") { alert("圖片載入失敗"); hideLoading(); return; }
                    fabric.Image.fromURL(imgCanvas.toDataURL('image/jpeg'), (img) => {
                        const slot = slots[freeSlot];
                        const scale = Math.max(slot.width / img.width, slot.height / img.height);
                        
                        let clipPath = null;
                        if(currentLayout !== 'full') {
                            clipPath = new fabric.Rect({ left: slot.left, top: slot.top, width: slot.width, height: slot.height, absolutePositioned: true });
                        }

                        img.set({ 
                            scaleX: scale, scaleY: scale, originX: 'left', originY: 'top',
                            left: slot.left + (slot.width - img.width * scale) / 2, top: slot.top + (slot.height - img.height * scale) / 2, 
                            isUserImage: true, slotIndex: freeSlot, clipPath: clipPath
                        });
                        canvas.add(img); canvas.setActiveObject(img); sortLayers();
                        fileIndex++; processNext(); 
                    });
                }, { orientation: true, canvas: true, maxWidth: 1200 }); 
            }
            processNext(); e.target.value = '';
        };

        function addPresetText(type) {
            let opts = { left: C_W / 2, top: C_H - 45, originX: 'center', originY: 'center', fontSize: 24, fill: '#000000', fontFamily: 'Noto Sans TC' };
            let textStr = '輸入文字...';

            switch(type) {
                case 'normal': break;
                case 'signature': 
                    textStr = 'With Love'; opts.fontFamily = 'Dancing Script'; opts.fontSize = 28; opts.left = C_W - 40; opts.top = C_H - 30; opts.originX = 'right'; opts.fill = '#1976d2'; break;
                case 'subtitle': 
                    textStr = '「我也很喜歡這張照片。」'; opts.fontFamily = 'Noto Sans TC'; opts.fontSize = 16; opts.fill = '#ffd700'; opts.top = 340; 
                    opts.shadow = new fabric.Shadow({ color: 'rgba(0,0,0,0.8)', blur: 2, offsetX: 1, offsetY: 1 }); break;
                case 'neon':
                    textStr = 'TWICE'; opts.fontFamily = 'Righteous'; opts.fontSize = 40; opts.fill = '#ffffff'; opts.top = C_H / 2;
                    opts.shadow = new fabric.Shadow({ color: '#ff00ff', blur: 15, offsetX: 0, offsetY: 0 }); break;
                case 'magazine':
                    textStr = 'VOGUE'; opts.fontFamily = 'Playfair Display'; opts.fontSize = 48; opts.fill = '#ffffff'; opts.top = 60;
                    opts.shadow = new fabric.Shadow({ color: 'rgba(0,0,0,0.3)', blur: 4, offsetX: 0, offsetY: 2 }); break;
                case 'typewriter': 
                    textStr = '1998.05.21'; opts.fontFamily = 'Special Elite'; opts.fill = '#ffffff'; opts.textBackgroundColor = '#000000'; opts.fontSize = 16; break;
                case 'japanese': 
                    textStr = '日\n系\n排\n版'; opts.fontFamily = 'Noto Serif TC'; opts.textAlign = 'center'; opts.fontSize = 18; opts.top = C_H / 2; opts.left = C_W - 30; break;
            }
            const text = new fabric.IText(textStr, opts); canvas.add(text); canvas.setActiveObject(text); sortLayers();
        }

        function setTextColor(hex) { const obj = canvas.getActiveObject(); if (obj && obj.type === 'i-text') { obj.set('fill', hex); canvas.requestRenderAll(); } }
        document.getElementById('fontFamily').addEventListener('change', async function(e) { const obj = canvas.getActiveObject(); if (obj && obj.type === 'i-text') { await document.fonts.load(`16px "${e.target.value}"`); obj.set('fontFamily', e.target.value); canvas.requestRenderAll(); } });
        function openLibrary() { openModal('libraryModal'); }
        function addSticker(url) { closeModal('libraryModal'); fabric.Image.fromURL(url, (img) => { img.set({ scaleX: 0.25, scaleY: 0.25, originX: 'center', originY: 'center', left: C_W / 2, top: C_H / 2, isSticker: true }); canvas.add(img); canvas.setActiveObject(img); sortLayers(); }); }

        function addFrame(url) {
            closeModal('frameModal'); removeFrame();
            fabric.Image.fromURL(url, (img) => { 
                img.set({ scaleX: C_W/img.width, scaleY: C_H/img.height, left: 0, top: 0, selectable: false, evented: false, isFrame: true }); 
                canvas.add(img); switchLayout('full'); sortLayers(); 
            });
        }
        function removeFrame() { const frames = canvas.getObjects().filter(o => o.isFrame); frames.forEach(f => canvas.remove(f)); canvas.requestRenderAll(); }

        function applyFilter(filterName, btn) {
            document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            let targetImg = canvas.getActiveObject();
            if (!targetImg || !targetImg.isUserImage) targetImg = canvas.getObjects().find(o => o.isUserImage);
            if (!targetImg) { alert("請先點選想套用濾鏡的照片喔！"); return; }

            const tempClip = targetImg.clipPath; targetImg.clipPath = null; targetImg.filters = [];
            switch (filterName) {
                case 'Original': break; 
                case 'KPop': targetImg.filters.push(new fabric.Image.filters.Brightness({ brightness: 0.05 })); targetImg.filters.push(new fabric.Image.filters.Contrast({ contrast: 0.1 })); targetImg.filters.push(new fabric.Image.filters.BlendColor({ color: '#ffe4e1', mode: 'tint', alpha: 0.25 })); break;
                case 'BoyBand': targetImg.filters.push(new fabric.Image.filters.Contrast({ contrast: 0.15 })); targetImg.filters.push(new fabric.Image.filters.Saturation({ saturation: -0.15 })); targetImg.filters.push(new fabric.Image.filters.BlendColor({ color: '#607d8b', mode: 'tint', alpha: 0.2 })); break;
                case 'Cool': targetImg.filters.push(new fabric.Image.filters.Brightness({ brightness: 0.05 })); targetImg.filters.push(new fabric.Image.filters.BlendColor({ color: '#e0f7fa', mode: 'tint', alpha: 0.2 })); break;
                case 'Film': targetImg.filters.push(new fabric.Image.filters.Contrast({ contrast: 0.1 })); targetImg.filters.push(new fabric.Image.filters.Saturation({ saturation: -0.1 })); targetImg.filters.push(new fabric.Image.filters.BlendColor({ color: '#8b4513', mode: 'tint', alpha: 0.15 })); break;
                case 'Vintage': targetImg.filters.push(new fabric.Image.filters.Sepia()); targetImg.filters.push(new fabric.Image.filters.Brightness({ brightness: -0.1 })); break;
                case 'Fresh': targetImg.filters.push(new fabric.Image.filters.Saturation({ saturation: 0.15 })); targetImg.filters.push(new fabric.Image.filters.Brightness({ brightness: 0.05 })); break;
                case 'Mono': targetImg.filters.push(new fabric.Image.filters.Grayscale()); break;
            }
            targetImg.applyFilters(); targetImg.clipPath = tempClip; canvas.requestRenderAll();
        }

        function bringFront() { const obj = canvas.getActiveObject(); if(obj) { canvas.bringToFront(obj); sortLayers(); } }
        function sendBack() { const obj = canvas.getActiveObject(); if(obj) { canvas.sendToBack(obj); sortLayers(); } }
        function deleteObj() { const obj = canvas.getActiveObject(); if(obj) { canvas.remove(obj); canvas.discardActiveObject(); document.getElementById('objectTools').classList.add('hidden'); } }
        function clearCanvas() { if(confirm("確定重置當前版面？")) { const objects = canvas.getObjects().filter(o => o.id !== 'overlayFrame' && o.id !== 'safeZone'); objects.forEach(o => canvas.remove(o)); document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active')); document.querySelector('.filter-item').classList.add('active'); } }

        function exportCanvas() {
            if (safeZoneRect) safeZoneRect.set('opacity', 0);
            guideLines.forEach(l => l.set('opacity', 0));
            canvas.discardActiveObject();
            canvas.requestRenderAll();
            const base64 = canvas.toDataURL({ format: 'png', multiplier: 3 });
            if (safeZoneRect) safeZoneRect.set('opacity', 1);
            canvas.requestRenderAll();
            return base64;
        }

        async function saveAndNext() {
            if (canvas.getObjects().filter(o => o.isUserImage || o.isFrame).length === 0) { alert("請先加入照片或設計喔！"); return; }
            if (isPreviewMode) { openModal('previewDoneModal'); return; }
            
            photoCart.push(exportCanvas());
            
            if (photoCart.length >= expectedPhotos) { await executeUpload(); } 
            else {
                const objects = canvas.getObjects().filter(o => o.id !== 'overlayFrame' && o.id !== 'safeZone'); objects.forEach(o => canvas.remove(o)); 
                updateProgressUI(); document.getElementById('statusMsg').innerText = `第 ${photoCart.length} 張已暫存！請繼續設計。`;
            }
        }

        // 🚀 BUG 修復：一鍵洗滿直接上傳
        function batchDuplicate() {
            if (canvas.getObjects().filter(o => o.isUserImage || o.isFrame).length === 0) { alert("請先設計好要洗的照片！"); return; }
            const remaining = expectedPhotos - photoCart.length; if (remaining <= 0) return;
            
            showLoading("正在自動洗滿剩餘相片...");
            
            setTimeout(() => {
                const base64 = exportCanvas();
                for (let i = 0; i < remaining; i++) { photoCart.push(base64); }
                executeUpload(); // 直接上傳！
            }, 100);
        }

        async function convertPreviewToReal() {
            const newOrderID = document.getElementById('previewOrderID').value.trim();
            if (!newOrderID) { alert("請輸入訂單編號"); return; }
            showLoading("驗證單號中...");

            try {
                const response = await fetch(`${SCRIPT_URL}?orderID=${newOrderID}`); const data = await response.json();
                if (data.status === 'success') {
                    isPreviewMode = false; expectedPhotos = parseInt(data.count); document.getElementById('orderID').value = newOrderID; closeModal('previewDoneModal'); 
                    hideLoading(); saveAndNext(); 
                } else { hideLoading(); alert(data.message); }
            } catch (error) { hideLoading(); alert("驗證失敗，請檢查網路。"); }
        }

        async function executeUpload() {
            showLoading("打包上傳至工作室...");

            try {
                await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ userName: document.getElementById('userName').value.trim(), orderID: document.getElementById('orderID').value.trim(), images: photoCart }), mode: 'no-cors' });
                document.getElementById('step2-container').classList.add('hidden'); document.getElementById('success-container').classList.remove('hidden'); 
                
                document.getElementById('resName').innerText = document.getElementById('userName').value.trim();
                document.getElementById('resOrderID').innerText = document.getElementById('orderID').value.trim();
                document.getElementById('resCount').innerText = `${expectedPhotos} 張`;
                const gallery = document.getElementById('galleryContainer'); gallery.innerHTML = ''; 
                photoCart.forEach((imgBase64, index) => {
                    gallery.innerHTML += `<div class="bg-gray-50 rounded-xl p-2 border border-gray-100 shadow-sm flex flex-col items-center justify-center min-h-[150px]"><img src="${imgBase64}" class="w-full h-auto rounded shadow-sm object-cover"><p class="text-center text-[10px] text-gray-400 mt-2 font-light">第 ${index+1} 張</p></div>`;
                });
            } catch (error) { alert("上傳失敗，請檢查網路。"); }
            hideLoading();
        }
    </script>
</body>
</html>
