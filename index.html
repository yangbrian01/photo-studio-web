<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO PHOTO STUDIO | 專屬相印</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://i.imgur.com/KzXG5Rj.png"> 

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@400;700&family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&family=Caveat:wght@600&display=swap');
        
        body { font-family: 'Roboto', 'Noto Sans TC', sans-serif; background-color: #f8f9fa; overscroll-behavior: none; -webkit-user-select: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .canvas-container { margin: 0 auto; box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-radius: 4px; background-color: white; transition: all 0.3s; }
        .color-dot { width: 22px; height: 22px; cursor: pointer; border-radius: 50%; border: 1px solid #e5e7eb; transition: all 0.2s; }
        .color-dot.active { border: 2px solid #000; box-shadow: 0 0 5px rgba(0,0,0,0.2); }
        .filter-scroll::-webkit-scrollbar { display: none; } 
        .filter-item { flex: 0 0 70px; border-radius: 8px; border: 1px solid #e5e7eb; cursor: pointer; transition: all 0.2s; background-color: white; padding: 4px; }
        .filter-item.active { border-color: #000; background-color: #f8f9fa; }
        
        /* 原圖對比按鈕的按壓效果 */
        #compareBtn:active { transform: scale(0.95); background-color: #e5e7eb; }
        
        /* 美顏拉桿美化 */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #000; cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e5e7eb; border-radius: 2px; }
    </style>
</head>
<body class="text-gray-900 antialiased relative py-10">

    <div style="visibility: hidden; position: absolute; top: -9999px;">
        <span style="font-family: 'Noto Serif TC';">預載</span><span style="font-family: 'Ma Shan Zheng';">預載</span><span style="font-family: 'Zhi Mang Xing';">預載</span><span style="font-family: 'ZCOOL QingKe HuangYou';">預載</span><span style="font-family: 'ZCOOL KuaiLe';">預載</span>
    </div>

    <div class="max-w-3xl mx-auto px-6">
        <header class="text-center mb-10 overflow-x-auto">
            <h1 class="text-3xl md:text-4xl font-light tracking-[0.3em] uppercase mb-2 text-gray-800">Pro Studio</h1>
            <p class="text-gray-400 text-xs tracking-widest font-light">Xiaomi Pro 2x3" (PWA 版本)</p>
        </header>

        <div id="step1-container" class="bg-white rounded-2xl shadow-sm p-8 mb-6 border border-gray-100 transition-all">
            <h2 class="text-base font-medium mb-6 flex items-center tracking-wider text-gray-700">
                <span class="w-6 h-6 shrink-0 bg-black text-white rounded-full text-xs flex items-center justify-center mr-3 font-normal">1</span>填寫訂單資訊
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <input type="text" id="userName" placeholder="蝦皮帳號 / 姓名 (必填)" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-black font-light text-sm">
                    <p id="nameError" class="text-red-500 text-xs mt-1 hidden tracking-wide">請填寫稱呼</p>
                </div>
                <input type="text" id="orderID" placeholder="蝦皮訂單編號" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-1 focus:ring-black font-light text-sm">
            </div>
            <button id="nextStepBtn" class="w-full bg-gray-900 text-white py-3.5 rounded-xl font-light tracking-widest hover:bg-black transition text-sm shadow-md">進入線上設計</button>
        </div>

        <div id="step2-container" class="bg-white rounded-2xl shadow-sm border border-gray-100 hidden fade-in overflow-hidden relative">
            
            <div class="bg-gray-100/50 py-10 relative flex justify-center border-b border-gray-50">
                <button id="compareBtn" class="absolute top-4 left-4 z-20 bg-white shadow-md border border-gray-100 px-3 py-1.5 rounded-full text-[10px] font-medium tracking-wide text-gray-600 transition flex items-center gap-1.5 select-none touch-none">
                    <i class="fa-solid fa-eye"></i> <span>長按看原圖</span>
                </button>
                
                <button id="layoutToggleBtn" onclick="toggleLayout()" class="absolute top-4 right-4 z-20 bg-white shadow-md border border-gray-100 px-3 py-1.5 rounded-full text-[10px] font-medium tracking-wide text-gray-600 hover:text-black transition flex items-center gap-1.5">
                    <i class="fa-solid fa-expand"></i> <span id="layoutText">目前: 白框</span>
                </button>
                <canvas id="editorCanvas"></canvas>
            </div>

            <div id="objectTools" class="px-6 py-4 bg-white hidden flex flex-col gap-4 transition border-b border-gray-50 relative z-10">
                
                <div id="beautyTools" class="hidden w-full space-y-3 bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] text-gray-500 w-8">美白</span>
                        <input type="range" id="brightSlider" min="0" max="0.3" step="0.05" value="0" class="flex-1">
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] text-gray-500 w-8">柔膚</span>
                        <input type="range" id="smoothSlider" min="0" max="0.5" step="0.1" value="0" class="flex-1">
                    </div>
                </div>

                <div class="flex justify-between items-center w-full">
                    <div class="flex gap-1 border border-gray-100 p-1 rounded-lg bg-gray-50/50">
                        <button onclick="bringFront()" class="w-9 h-9 text-gray-500 hover:text-black rounded-md"><i class="fa-solid fa-layer-group"></i></button>
                        <button onclick="sendBack()" class="w-9 h-9 text-gray-500 hover:text-black rounded-md"><i class="fa-solid fa-layer-group fa-flip-vertical"></i></button>
                    </div>

                    <div id="textTools" class="hidden flex-1 flex gap-5 items-center justify-center">
                        <select id="fontFamily" class="text-xs px-2 py-1.5 border border-gray-100 rounded-lg max-w-[120px]">
                            <option value="Noto Sans TC">黑體</option><option value="Noto Serif TC">宋體</option><option value="Ma Shan Zheng">毛筆</option><option value="Zhi Mang Xing">狂草</option><option value="ZCOOL QingKe HuangYou">麥克筆</option><option value="ZCOOL KuaiLe">圓體</option><option value="Caveat">英文手寫</option>
                        </select>
                        <div class="flex-1 max-w-sm border border-gray-100 p-2 rounded-xl bg-gray-50/50 overflow-x-auto">
                            <div class="grid grid-cols-8 gap-1.5 justify-items-center" id="colorPalette"></div>
                        </div>
                    </div>

                    <button onclick="deleteObj()" class="w-10 h-10 bg-red-50 text-red-400 rounded-xl"><i class="fa-regular fa-trash-can"></i></button>
                </div>
            </div>

            <div class="px-6 py-5 bg-white space-y-5">
                <div class="p-4 border border-gray-100 rounded-xl bg-gray-50/50">
                    <label class="text-[11px] text-gray-400 font-medium mb-3 block text-center">風格濾鏡 (可左右滑動)</label>
                    <div class="flex overflow-x-auto gap-3.5 filter-scroll pb-2 snap-x">
                        <button onclick="applyFilter('Original', this)" class="filter-item active text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5"><span class="text-[10px] font-light">原圖</span></button>
                        <button onclick="applyFilter('KPop', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5 hue-rotate-15 contrast-125 saturate-150"><span class="text-[10px] font-medium text-pink-500">KPop粉</span></button>
                        <button onclick="applyFilter('BoyBand', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5 contrast-125 saturate-50 hue-rotate-180"><span class="text-[10px] font-medium text-blue-700">冷冽男團</span></button>
                        <button onclick="applyFilter('Film', this)" class="filter-item text-center snap-center"><img src="https://i.imgur.com/7bA7y6P.png" class="w-full h-10 object-cover rounded mb-1.5 sepia-[.3] contrast-125"><span class="text-[10px] font-light">底片感</span></button>
                    </div>
                </div>

                <div class="flex justify-around items-center max-w-md mx-auto">
                    <label class="flex flex-col items-center gap-1.5 cursor-pointer text-gray-600 hover:text-black">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg"><i class="fa-regular fa-image"></i></div><span class="text-xs font-light">照片</span>
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                    </label>
                    <button onclick="addText()" class="flex flex-col items-center gap-1.5 text-gray-600 hover:text-black">
                        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-lg"><i class="fa-solid fa-t"></i></div><span class="text-xs font-light">文字</span>
                    </button>
                </div>
            </div>
        </div>

        <button id="submitBtn" onclick="uploadDesign()" class="w-full bg-black text-white py-4 mt-6 rounded-xl font-light tracking-[0.2em] hover:bg-gray-800 transition text-sm hidden fade-in shadow-xl">確認並上傳</button>
        <p id="statusMsg" class="mt-4 text-center text-sm font-light tracking-wide"></p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaCLSapAY7-odkPz8f8Vct843Ub001UGVmj92dckJtOkCieCa7iDWvysf5BwXmM_Bo/exec";
        let isPreviewMode = false, canvas, userImageObject;
        const C_W = 300, C_H = 456, P_LEFT = 18, P_TOP = 18, P_WIDTH = 264, P_HEIGHT = 338; 
        let isPolaroidLayout = true; 
        let isComparing = false; // 對比狀態

        const PREMIUM_COLORS = ['#000000', '#595959', '#a6a6a6', '#d9d9d9', '#6d4c41', '#a1887f', '#ef5350', '#1976d2'];

        // --- 初始化與步驟 ---
        document.getElementById('nextStepBtn').onclick = () => {
            const userName = document.getElementById('userName').value.trim();
            if (!userName) { document.getElementById('nameError').classList.remove('hidden'); return; }
            document.getElementById('nameError').classList.add('hidden');
            unlockStep2();
        };

        function unlockStep2() {
            document.getElementById('step1-container').classList.add('opacity-50', 'pointer-events-none');
            document.getElementById('step2-container').classList.remove('hidden');
            document.getElementById('submitBtn').classList.remove('hidden');
            setTimeout(() => { if (!canvas) initCanvas(); document.getElementById('step2-container').scrollIntoView({ behavior: 'smooth' }); }, 50);
        }

        function initCanvas() {
            canvas = new fabric.Canvas('editorCanvas', { width: C_W, height: C_H, backgroundColor: '#ffffff', preserveObjectStacking: true });
            const palette = document.getElementById('colorPalette');
            PREMIUM_COLORS.forEach((color, i) => {
                const dot = document.createElement('div'); dot.className = `color-dot ${i === 0 ? 'active' : ''}`; dot.style.backgroundColor = color;
                dot.onclick = () => { document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); dot.classList.add('active'); setTextColor(color); };
                palette.appendChild(dot);
            });
            fabric.Object.prototype.set({ transparentCorners: false, cornerColor: '#fff', borderColor: '#000', cornerStrokeColor: '#000', cornerSize: 9 });
            const placeholder = new fabric.Rect({ id: 'placeholder', left: P_LEFT, top: P_TOP, width: P_WIDTH, height: P_HEIGHT, fill: '#f9fafb', stroke: '#e5e7eb', strokeDashArray: [3, 3], selectable: false, evented: false });
            canvas.add(placeholder);
            canvas.on('selection:created', onSelection); canvas.on('selection:updated', onSelection);
            canvas.on('selection:cleared', () => document.getElementById('objectTools').classList.add('hidden'));
        }

        // --- 選取判定 (文字 vs 照片) ---
        function onSelection() {
            document.getElementById('objectTools').classList.remove('hidden');
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                document.getElementById('textTools').classList.remove('hidden');
                document.getElementById('beautyTools').classList.add('hidden');
            } else if (activeObj && activeObj.frameId === 'userImage') {
                document.getElementById('textTools').classList.add('hidden');
                document.getElementById('beautyTools').classList.remove('hidden'); // 顯示美顏拉桿
            } else {
                document.getElementById('textTools').classList.add('hidden');
                document.getElementById('beautyTools').classList.add('hidden');
            }
        }

        // --- 載入照片 ---
        document.getElementById('imageInput').onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    userImageObject = img; userImageObject.currentFilter = 'Original';
                    const scale = Math.max(P_WIDTH / img.width, P_HEIGHT / img.height);
                    img.set({ scaleX: scale, scaleY: scale, originX: 'center', originY: 'center', left: C_W / 2, top: P_TOP + (P_HEIGHT / 2), frameId: 'userImage' });
                    img.set('clipPath', new fabric.Rect({ left: P_LEFT, top: P_TOP, width: P_WIDTH, height: P_HEIGHT, absolutePositioned: true }));
                    canvas.add(img); canvas.sendToBack(img); canvas.bringForward(img); canvas.setActiveObject(img);
                });
            }; reader.readAsDataURL(file); e.target.value = '';
        };

        // --- 💣 手動修圖與合成算法 ---
        document.getElementById('brightSlider').addEventListener('input', applyCompositeFilters);
        document.getElementById('smoothSlider').addEventListener('input', applyCompositeFilters);

        function applyFilter(filterName, btn) {
            if (!userImageObject) return;
            document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            userImageObject.currentFilter = filterName;
            applyCompositeFilters();
        }

        function applyCompositeFilters() {
            if (!userImageObject || isComparing) return; // 如果正在對比原圖，不執行濾鏡
            userImageObject.filters = [];
            
            // 1. 手動美白 (Brightness)
            const brightVal = parseFloat(document.getElementById('brightSlider').value);
            if(brightVal > 0) userImageObject.filters.push(new fabric.Image.filters.Brightness({ brightness: brightVal }));

            // 2. 手動柔膚 (Blur) - 替代原本爛爛的 Convolve
            const smoothVal = parseFloat(document.getElementById('smoothSlider').value);
            if(smoothVal > 0) userImageObject.filters.push(new fabric.Image.filters.Blur({ blur: smoothVal }));

            // 3. 風格濾鏡
            const mode = userImageObject.currentFilter || 'Original';
            switch (mode) {
                case 'KPop': userImageObject.filters.push(new fabric.Image.filters.BlendColor({ color: '#ffb6c1', mode: 'screen', alpha: 0.15 })); break;
                case 'BoyBand': userImageObject.filters.push(new fabric.Image.filters.Saturation({ saturation: -0.2 })); userImageObject.filters.push(new fabric.Image.filters.BlendColor({ color: '#607d8b', mode: 'multiply', alpha: 0.15 })); break;
                case 'Film': userImageObject.filters.push(new fabric.Image.filters.Sepia()); userImageObject.filters.push(new fabric.Image.filters.BlendColor({ color: '#1a1a1a', mode: 'overlay', alpha: 0.15 })); break;
            }
            userImageObject.applyFilters(); canvas.requestRenderAll();
        }

        // --- 💣 長按對比原圖邏輯 ---
        const compareBtn = document.getElementById('compareBtn');
        const startCompare = (e) => { 
            e.preventDefault(); if(!userImageObject) return; 
            isComparing = true; 
            userImageObject.filters = []; // 拔掉所有濾鏡
            userImageObject.applyFilters(); canvas.requestRenderAll(); 
        };
        const stopCompare = (e) => { 
            e.preventDefault(); if(!userImageObject) return; 
            isComparing = false; 
            applyCompositeFilters(); // 恢復濾鏡
        };
        compareBtn.addEventListener('mousedown', startCompare); compareBtn.addEventListener('mouseup', stopCompare); compareBtn.addEventListener('mouseleave', stopCompare);
        compareBtn.addEventListener('touchstart', startCompare); compareBtn.addEventListener('touchend', stopCompare);

        // --- 其他排版與上傳 ---
        function toggleLayout() {
            isPolaroidLayout = !isPolaroidLayout; document.getElementById('layoutText').innerText = isPolaroidLayout ? "目前: 白框" : "目前: 滿版";
            const placeholder = canvas.getObjects().find(o => o.id === 'placeholder'); if (placeholder) placeholder.set('opacity', isPolaroidLayout ? 1 : 0);
            if (userImageObject) userImageObject.set('clipPath', isPolaroidLayout ? new fabric.Rect({ left: P_LEFT, top: P_TOP, width: P_WIDTH, height: P_HEIGHT, absolutePositioned: true }) : null);
            canvas.requestRenderAll();
        }
        function addText() { const text = new fabric.IText('輸入...', { left: C_W / 2, top: C_H - 50, fontFamily: 'Noto Sans TC', fontSize: 24, fill: '#000000', originX: 'center', originY: 'center' }); canvas.add(text); canvas.bringToFront(text); canvas.setActiveObject(text); }
        function setTextColor(hex) { const obj = canvas.getActiveObject(); if (obj && obj.type === 'i-text') { obj.set('fill', hex); canvas.requestRenderAll(); } }
        document.getElementById('fontFamily').addEventListener('change', async function(e) { const obj = canvas.getActiveObject(); if (obj && obj.type === 'i-text') { await document.fonts.load(`16px "${e.target.value}"`); obj.set('fontFamily', e.target.value); canvas.requestRenderAll(); } });
        function bringFront() { const obj = canvas.getActiveObject(); if(obj) { canvas.bringToFront(obj); canvas.requestRenderAll(); } }
        function sendBack() { const obj = canvas.getActiveObject(); if(obj) { canvas.sendToBack(obj); if(userImageObject) canvas.bringForward(userImageObject); canvas.requestRenderAll(); } }
        function deleteObj() { const obj = canvas.getActiveObject(); if(obj) { if(obj === userImageObject) userImageObject = null; canvas.remove(obj); canvas.discardActiveObject(); document.getElementById('objectTools').classList.add('hidden'); } }

        async function uploadDesign() {
            if (canvas.getObjects().length <= 1) { alert("請先加入設計！"); return; }
            const btn = document.getElementById('submitBtn'), msg = document.getElementById('statusMsg');
            btn.disabled = true; btn.innerText = "打包高清檔案中..."; msg.innerText = "處理中...";
            canvas.discardActiveObject(); canvas.requestRenderAll();
            const base64Image = canvas.toDataURL({ format: 'png', multiplier: 4 });
            try {
                await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ userName: document.getElementById('userName').value.trim(), orderID: document.getElementById('orderID').value.trim(), imageB64: base64Image }), mode: 'no-cors' });
                msg.innerText = "✓ 成功！"; btn.innerText = "完成";
            } catch (error) { msg.innerText = "失敗"; btn.disabled = false; }
        }
    </script>
</body>
</html>
